<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44">
  <!-- 大發貨運 Logo -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Truck icon -->
  <rect x="4" y="12" width="22" height="16" rx="2" fill="url(#truckGrad)"/>
  <polygon points="26,16 34,16 38,22 38,28 26,28" fill="url(#truckGrad)" opacity="0.85"/>
  <rect x="26" y="22" width="12" height="6" rx="1" fill="#fef3c7" opacity="0.5"/>
  <circle cx="13" cy="30" r="3.5" fill="#0f3a57" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="33" cy="30" r="3.5" fill="#0f3a57" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Speed lines -->
  <line x1="1" y1="18" x2="4" y2="18" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="22" x2="4" y2="22" stroke="#fbbf24" stroke-width="1.2" opacity="0.7"/>
  <line x1="1" y1="26" x2="4" y2="26" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
  <!-- Text: 国韵好运 -->
  <text x="46" y="28" font-family="Arial,Microsoft JhengHei,sans-serif" font-size="18" font-weight="bold" fill="#ffffff" letter-spacing="2">国韵好运</text>
  <!-- Subtitle -->
  <text x="46" y="40" font-family="Arial,sans-serif" font-size="7" fill="#fbbf24" letter-spacing="1" opacity="0.8">GUOYUN EXPRESS</text>
</svg>