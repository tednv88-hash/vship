{{define "pages/page_designs"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.page_designs.title">頁面設計</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.page_designs.page_id">頁面ID</th>
                    <th width="40%" data-i18n="pages.page_designs.page_name">頁面名稱</th>
                    <th data-i18n="pages.page_designs.page_type">頁面類型</th>
                    <th data-i18n="pages.page_designs.add_time">添加時間</th>
                    <th data-i18n="pages.page_designs.update_time">更新時間</th>
                    <th data-i18n="common.actions">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle" data-i18n="pages.page_designs.add_page">新增頁面</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" name="id">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.page_designs.page_name">頁面名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.page_designs.page_type">頁面類型</label>
                        <select class="form-select" name="type">
                            <option value="home" data-i18n="pages.page_designs.shop_home">商城首頁</option>
                            <option value="custom" data-i18n="pages.page_designs.custom_page">自定義頁</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1; const limit = 20; let editingId = null;
const API_PATH = '/page-designs';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
const typeLabels = {
    home: () => _t('pages.page_designs.shop_home', '商城首頁'),
    category: () => _t('pages.page_designs.category_page', '分類頁'),
    custom: () => _t('pages.page_designs.custom_page', '自定義頁')
};
const typeBadgeClass = { home: 'bg-warning text-dark', category: 'bg-info', custom: 'bg-secondary' };

function loadData(page) {
    currentPage = page;
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit);
}
function renderRow(item) {
    const typeClass = typeBadgeClass[item.type] || 'bg-secondary';
    const labelFn = typeLabels[item.type];
    const typeLabel = labelFn ? labelFn() : (item.type || '--');
    const typeBadge = `<span class="badge ${typeClass}">${typeLabel}</span>`;
    const isHome = item.is_default;

    let actions = `<a href="/client/page-designs/${item.id}/edit" class="btn btn-sm btn-outline-primary me-1"><i class="fas fa-edit me-1"></i>${_t('common.edit', '編輯')}</a>`;
    if (!isHome) {
        actions += `<button class="btn btn-sm btn-outline-danger me-1" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>`;
        actions += `<button class="btn btn-sm btn-outline-success" onclick="setHome('${item.id}')"><i class="fas fa-home me-1"></i>${_t('pages.page_designs.set_as_home', '設為首頁')}</button>`;
    }

    return `<tr>
        <td class="text-muted" style="font-size:0.8rem">${(item.id || '').substring(0,8)}...</td>
        <td>${item.name || '--'}</td>
        <td>${typeBadge}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>${formatDate(item.updated_at)}</td>
        <td><div class="action-buttons">${actions}</div></td>
    </tr>`;
}
function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.page_designs.add_page', '新增頁面');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.page_designs.add_page');
    resetForm('itemForm');
    openModal('formModal');
}
async function saveItem() {
    const data = getFormData('itemForm');
    try {
        if (editingId) {
            await apiRequest('PUT', API_PATH + '/' + editingId, data);
            showToast(_t('common.update_success', '更新成功'));
        } else {
            const res = await apiRequest('POST', API_PATH, data);
            showToast(_t('common.create_success', '建立成功'));
            const newId = res.data ? res.data.id : (res.id || null);
            if (newId) {
                window.location.href = '/client/page-designs/' + newId + '/edit';
                return;
            }
        }
        closeModal('formModal');
        loadData(currentPage);
    } catch (e) {}
}
async function deleteItem(id) {
    if (!confirmDelete()) return;
    try {
        await apiRequest('DELETE', API_PATH + '/' + id);
        showToast(_t('common.delete_success', '刪除成功'));
        loadData(currentPage);
    } catch (e) {}
}
async function setHome(id) {
    if (!confirm(_t('pages.page_designs.confirm_set_home', '確定要將此頁面設置為默認首頁嗎？'))) return;
    try {
        await apiRequest('PUT', API_PATH + '/' + id, { is_default: true });
        showToast(_t('pages.page_designs.set_success', '設置成功'));
        loadData(currentPage);
    } catch (e) {}
}
document.addEventListener('DOMContentLoaded', () => loadData(1));
</script>
{{end}}
