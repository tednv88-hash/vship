{{define "pages/store_settings"}}
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0" data-i18n="pages.store_settings.title">商城設置</h5>
    </div>
    <div class="card-body">
        <form id="settingsForm">
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.store_settings.store_name">商城名稱</label>
                <input type="text" class="form-control" name="store_name">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.store_settings.store_logo">商城 Logo URL</label>
                <input type="url" class="form-control" name="store_logo" placeholder="https://">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.store_settings.service_phone">客服電話</label>
                <input type="text" class="form-control" name="service_phone">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.store_settings.business_hours">營業時間</label>
                <input type="text" class="form-control" name="business_hours" data-i18n-placeholder="pages.store_settings.hours_example" placeholder="例: 09:00 - 18:00">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.store_settings.return_address">退貨地址</label>
                <textarea class="form-control" name="return_address" rows="2"></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" data-i18n="pages.store_settings.auto_confirm_days">自動確認收貨天數</label>
                    <input type="number" class="form-control" name="auto_confirm_days" data-type="number" value="15">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" data-i18n="pages.store_settings.order_timeout">訂單超時取消時間（分鐘）</label>
                    <input type="number" class="form-control" name="order_cancel_minutes" data-type="number" value="30">
                </div>
            </div>
            <button type="button" class="btn btn-primary" onclick="saveSettings()" data-i18n="common.save_settings">儲存設置</button>
        </form>
    </div>
</div>

<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
const SETTING_KEY = 'store_setting';

async function loadSettings() {
    try {
        const res = await apiRequest('GET', '/settings/' + SETTING_KEY);
        const data = res.data || res;
        if (data && data.value) {
            const val = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
            populateForm('settingsForm', val);
        }
    } catch (e) {}
}

async function saveSettings() {
    const data = getFormData('settingsForm');
    try {
        await apiRequest('PUT', '/settings/' + SETTING_KEY, { key: SETTING_KEY, value: JSON.stringify(data) });
        showToast(_t('pages.store_settings.save_success', '儲存成功'));
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => loadSettings());
</script>
{{end}}
