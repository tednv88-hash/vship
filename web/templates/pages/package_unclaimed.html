{{define "pages/package_unclaimed"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.package_unclaimed.title">待認領包裹</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.package_unclaimed.search_tracking" placeholder="搜尋運單號...">
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.package_scan_in.tracking_no">運單號</th>
                    <th data-i18n="pages.packages.category">分類</th>
                    <th data-i18n="pages.package_unclaimed.weight_kg">重量 (kg)</th>
                    <th data-i18n="pages.package_claim.storage_time">入庫時間</th>
                    <th data-i18n="common.actions">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<div class="modal fade" id="assignModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" data-i18n="pages.package_unclaimed.assign_user">分配用戶</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="assignForm">
                    <input type="hidden" name="package_id" id="assignPackageId">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.package_unclaimed.user_id_label">用戶ID <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="user_id" id="assignUserId" required data-i18n-placeholder="pages.package_unclaimed.enter_user_id" placeholder="輸入用戶ID">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
                <button type="button" class="btn btn-primary" onclick="confirmAssign()" data-i18n="pages.package_unclaimed.confirm_assign">確認分配</button>
            </div>
        </div>
    </div>
</div>

<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

let currentPage = 1; const limit = 20;
const API_PATH = '/packages';

function loadData(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    const params = buildQueryParams({ search, unclaimed: 'true' });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    return `<tr>
        <td><strong>${item.tracking_no || '--'}</strong></td>
        <td>${item.category_name || '--'}</td>
        <td>${item.weight || 0}</td>
        <td>${formatDate(item.received_at || item.created_at)}</td>
        <td>
            <div class="action-buttons">
                <button class="btn btn-sm btn-outline-success" onclick="openAssignModal('${item.id}')" title="${_t('pages.package_unclaimed.assign_user', '分配用戶')}"><i class="fas fa-user-plus"></i></button>
                <a href="/packages/${item.id}/edit" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
            </div>
        </td>
    </tr>`;
}
function openAssignModal(packageId) {
    document.getElementById('assignPackageId').value = packageId;
    document.getElementById('assignUserId').value = '';
    openModal('assignModal');
}
async function confirmAssign() {
    const packageId = document.getElementById('assignPackageId').value;
    const userId = document.getElementById('assignUserId').value;
    if (!userId) { showToast(_t('pages.package_unclaimed.please_enter_user_id', '請輸入用戶ID'), 'warning'); return; }
    try {
        await apiRequest('PUT', API_PATH + '/' + packageId, { user_id: userId });
        showToast(_t('pages.package_unclaimed.assign_success', '分配成功'));
        closeModal('assignModal');
        loadData(currentPage);
    } catch (e) {}
}
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
