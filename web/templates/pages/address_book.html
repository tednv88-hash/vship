{{define "pages/address_book"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.address_book.title">地址簿管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.address_book.search_recipient" placeholder="搜尋收件人/手機/地址...">
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.address_book.recipient">收件人</th>
                    <th data-i18n="pages.address_book.phone">手機號碼</th>
                    <th data-i18n="pages.address_book.country">國家</th>
                    <th data-i18n="pages.address_book.province">省/州</th>
                    <th data-i18n="pages.address_book.city">城市</th>
                    <th data-i18n="pages.address_book.address">地址</th>
                    <th data-i18n="pages.address_book.default">預設</th>
                    <th data-i18n="common.actions">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle" data-i18n="pages.address_book.add_address">新增地址</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" name="id" id="itemId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" data-i18n="pages.address_book.recipient">收件人 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="recipient_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" data-i18n="pages.address_book.phone">手機號碼 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="phone" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" data-i18n="pages.address_book.country">國家</label>
                            <select class="form-select" name="country_id" id="countrySelect">
                                <option value="" data-i18n="common.please_select">請選擇</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" data-i18n="pages.address_book.postal_code">郵遞區號</label>
                            <input type="text" class="form-control" name="postal_code">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label" data-i18n="pages.address_book.province">省/州</label>
                            <input type="text" class="form-control" name="province">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label" data-i18n="pages.address_book.city">城市</label>
                            <input type="text" class="form-control" name="city">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label" data-i18n="pages.address_book.district">區/鄉鎮</label>
                            <input type="text" class="form-control" name="district">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.address_book.detail_address">詳細地址 <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="address" rows="2" required></textarea>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" name="is_default" id="isDefault" value="true">
                        <label class="form-check-label" for="isDefault" data-i18n="pages.address_book.set_default">設為預設地址</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1; const limit = 20; let editingId = null;
const API_PATH = '/address-book';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function loadData(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, buildQueryParams({ search }));
}
function renderRow(item) {
    const defaultBadge = item.is_default ? `<span class="badge bg-success">${_t('pages.address_book.default_label', '預設')}</span>` : '';
    return `<tr>
        <td>${item.recipient_name || '--'}</td>
        <td>${item.phone || '--'}</td>
        <td>${item.country_name || '--'}</td>
        <td>${item.province || '--'}</td>
        <td>${item.city || '--'}</td>
        <td>${item.address || '--'}</td>
        <td>${defaultBadge}</td>
        <td>
            <div class="action-buttons">
                <button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        </td>
    </tr>`;
}
function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.address_book.add_address', '新增地址');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.address_book.add_address');
    resetForm('itemForm'); openModal('formModal');
}
async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.address_book.edit_address', '編輯地址');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.address_book.edit_address');
    try {
        const res = await apiRequest('GET', API_PATH + '/' + id);
        const data = res.data || res;
        populateForm('itemForm', data);
        document.getElementById('isDefault').checked = !!data.is_default;
        openModal('formModal');
    } catch (e) {}
}
async function saveItem() {
    const data = getFormData('itemForm');
    data.is_default = document.getElementById('isDefault').checked;
    try {
        if (editingId) { await apiRequest('PUT', API_PATH + '/' + editingId, data); showToast(_t('common.update_success','更新成功')); }
        else { await apiRequest('POST', API_PATH, data); showToast(_t('common.create_success','建立成功')); }
        closeModal('formModal'); loadData(currentPage);
    } catch (e) {}
}
async function deleteItem(id) { if (!confirmDelete(_t('pages.address_book.confirm_delete','確定要刪除此地址嗎？'))) return; try { await apiRequest('DELETE', API_PATH + '/' + id); showToast(_t('common.delete_success','刪除成功')); loadData(currentPage); } catch (e) {} }
document.addEventListener('DOMContentLoaded', async function() {
    loadData(1);
    try {
        const countries = await apiRequest('GET', '/countries?limit=100');
        const sel = document.getElementById('countrySelect');
        (countries.data || countries || []).forEach(c => {
            sel.insertAdjacentHTML('beforeend', `<option value="${c.id}">${c.name_zh || c.name}</option>`);
        });
    } catch (e) {}
});
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
