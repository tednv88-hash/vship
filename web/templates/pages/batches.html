{{define "pages/batches"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.batches.title">批次管理</h5>
        <a href="/batches/create" class="btn btn-primary btn-sm">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </a>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.batches.search_batch" placeholder="搜尋批次編號...">
        </div>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="common.filter_all_status">全部狀態</option>
            <option value="pending" data-i18n="common.status_pending">待處理</option>
            <option value="processing" data-i18n="common.status_processing">處理中</option>
            <option value="shipping" data-i18n="common.status_shipping">運送中</option>
            <option value="delivered" data-i18n="common.status_delivered">已送達</option>
            <option value="completed" data-i18n="common.status_completed">已完成</option>
        </select>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadBatches(1)">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.batches.batch_number">批次編號</th>
                    <th data-i18n="pages.batches.route">線路</th>
                    <th data-i18n="pages.batches.order_count">訂單數</th>
                    <th data-i18n="pages.batches.total_weight">總重量</th>
                    <th data-i18n="pages.batches.logistics_company">物流公司</th>
                    <th data-i18n="pages.batches.logistics_tracking_no">物流單號</th>
                    <th data-i18n="common.status">狀態</th>
                    <th data-i18n="common.created_at">建立時間</th>
                    <th data-i18n="common.actions">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="9" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<script>
let currentPage = 1;
const limit = 20;
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function loadBatches(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    const status = document.getElementById('filterStatus').value;
    const params = buildQueryParams({ search, status });
    loadTableData('/batches', 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    return `<tr>
        <td><a href="/batches/${item.id}">${item.batch_no || '--'}</a></td>
        <td>${item.route_name || '--'}</td>
        <td>${item.order_count || 0}</td>
        <td>${item.total_weight || 0} kg</td>
        <td>${item.logistics_company || '--'}</td>
        <td>${item.logistics_tracking_no || '--'}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>
            <div class="action-buttons">
                <a href="/batches/${item.id}" class="btn btn-sm btn-outline-primary"><i class="fas fa-eye"></i></a>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteBatch('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        </td>
    </tr>`;
}

async function deleteBatch(id) {
    if (!confirmDelete(_t('pages.batches.confirm_delete', '確定要刪除此批次嗎？'))) return;
    try {
        await apiRequest('DELETE', '/batches/' + id);
        showToast(_t('common.delete_success', '刪除成功'), 'success');
        loadBatches(currentPage);
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => loadBatches(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadBatches(1)));
document.getElementById('filterStatus').addEventListener('change', () => loadBatches(1));
</script>
{{end}}
