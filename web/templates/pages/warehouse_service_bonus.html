{{define "pages/warehouse_service_bonus"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.warehouse_service_bonus.title">服務分成</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="pages.warehouse_service_bonus.add_rule">新增規則</span></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.warehouse_service_bonus.search_placeholder" placeholder="搜尋員工/倉庫...">
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.warehouse_service_bonus.employee">員工</th>
                <th data-i18n="pages.warehouse_service_bonus.warehouse">倉庫</th>
                <th data-i18n="pages.warehouse_service_bonus.bonus_type">分成類型</th>
                <th data-i18n="pages.warehouse_service_bonus.bonus_rate">分成比例</th>
                <th data-i18n="pages.warehouse_service_bonus.total_amount">累計金額</th>
                <th data-i18n="common.status">狀態</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.warehouse_service_bonus.add_share_rule">新增分成規則</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><form id="dataForm"><input type="hidden" id="editId">
            <div class="mb-3"><label class="form-label" data-i18n="pages.warehouse_service_bonus.employee_label">員工</label><select class="form-select" id="clerk_id"><option value="" data-i18n="common.please_select">請選擇</option></select></div>
            <div class="mb-3"><label class="form-label" data-i18n="pages.warehouse_service_bonus.bonus_type">分成類型</label><select class="form-select" id="bonus_type">
                <option value="percentage" data-i18n="pages.warehouse_service_bonus.type_percentage">按比例</option><option value="fixed" data-i18n="pages.warehouse_service_bonus.type_fixed">固定金額</option></select></div>
            <div class="mb-3"><label class="form-label" data-i18n="pages.warehouse_service_bonus.bonus_value">分成數值</label><input type="number" class="form-control" id="bonus_value" step="0.01" min="0"></div>
            <div class="mb-3"><label class="form-label" data-i18n="common.status">狀態</label><select class="form-select" id="status"><option value="active" data-i18n="common.status_active">啟用</option><option value="inactive" data-i18n="common.status_inactive">停用</option></select></div>
        </form></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
    </div></div>
</div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
const API_PATH = '/warehouse/bonuses'; let currentPage = 1; const limit = 20;
async function loadClerks() { try { const res = await apiRequest('GET', '/warehouse-clerks?limit=100');
    const sel = document.getElementById('clerk_id'); (res.data || []).forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name || c.user_name}</option>`; }); } catch(e) {} }
function loadData(page) { currentPage = page; const search = document.getElementById('searchInput').value;
    const params = buildQueryParams({ search }); loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params); }
function renderRow(item) { return `<tr><td>${item.clerk_name || '--'}</td><td>${item.warehouse_name || '--'}</td>
    <td>${item.bonus_type === 'percentage' ? _t('pages.warehouse_service_bonus.type_percentage', '按比例') : _t('pages.warehouse_service_bonus.type_fixed', '固定金額')}</td><td>${item.bonus_value || 0}${item.bonus_type === 'percentage' ? '%' : ''}</td>
    <td>${formatMoney(item.total_earned || 0)}</td><td>${getStatusBadge(item.status)}</td>
    <td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
    <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`; }
function openCreateModal() { document.getElementById('modalTitle').textContent = _t('pages.warehouse_service_bonus.add_share_rule', '新增分成規則'); document.getElementById('editId').value = ''; resetForm('dataForm'); openModal('formModal'); }
async function editItem(id) { try { const res = await apiRequest('GET', API_PATH + '/' + id); const d = res.data || res;
    document.getElementById('editId').value = d.id; populateForm('dataForm', d); document.getElementById('modalTitle').textContent = _t('pages.warehouse_service_bonus.edit_share_rule', '編輯分成規則'); openModal('formModal'); } catch(e) {} }
async function saveItem() { const id = document.getElementById('editId').value; const data = getFormData('dataForm');
    try { if (id) { await apiRequest('PUT', API_PATH + '/' + id, data); } else { await apiRequest('POST', API_PATH, data); }
    showToast(_t('pages.warehouse_service_bonus.save_success', '儲存成功'), 'success'); closeModal('formModal'); loadData(currentPage); } catch(e) {} }
async function deleteItem(id) { if (!confirmDelete(_t('pages.warehouse_service_bonus.confirm_delete', '確定刪除嗎？'))) return;
    try { await apiRequest('DELETE', API_PATH + '/' + id); showToast(_t('common.delete_success', '刪除成功'), 'success'); loadData(currentPage); } catch(e) {} }
document.addEventListener('DOMContentLoaded', () => { loadClerks(); loadData(1); });
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
