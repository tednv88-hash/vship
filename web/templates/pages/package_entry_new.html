{{define "pages/package_entry_new"}}
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0"><i class="fas fa-keyboard me-2"></i><span data-i18n="pages.package_entry.title">新後台錄入</span></h5>
    </div>
    <div class="card-body">
        <form id="entryForm">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label" data-i18n="pages.package_entry.tracking_no">快遞單號 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="trackingNo" required autofocus>
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="pages.orders.user">用戶</label>
                    <select class="form-select" id="userId">
                        <option value="" data-i18n="pages.package_entry.auto_match">自動匹配</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="pages.package_entry.warehouse">倉庫 <span class="text-danger">*</span></label>
                    <select class="form-select" id="warehouseId" required>
                        <option value="" data-i18n="pages.package_entry.select_warehouse">請選擇倉庫</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label" data-i18n="pages.package_entry.weight_kg">重量(kg)</label>
                    <input type="number" class="form-control" id="weight" step="0.01" min="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label" data-i18n="pages.package_entry.length_cm">長(cm)</label>
                    <input type="number" class="form-control" id="length" step="0.1" min="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label" data-i18n="pages.package_entry.width_cm">寬(cm)</label>
                    <input type="number" class="form-control" id="width" step="0.1" min="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label" data-i18n="pages.package_entry.height_cm">高(cm)</label>
                    <input type="number" class="form-control" id="height" step="0.1" min="0">
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="pages.packages.category">包裹分類</label>
                    <select class="form-select" id="categoryId">
                        <option value="" data-i18n="pages.package_entry.select_category">請選擇分類</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="pages.packages.shelf_location">貨架位置</label>
                    <input type="text" class="form-control" id="shelfLocation" data-i18n-placeholder="pages.package_entry.shelf_example" placeholder="例: A-01-03">
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="pages.packages.pieces">件數</label>
                    <input type="number" class="form-control" id="quantity" value="1" min="1">
                </div>
                <div class="col-12">
                    <label class="form-label" data-i18n="common.remark">備注</label>
                    <textarea class="form-control" id="remark" rows="2"></textarea>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i><span data-i18n="pages.package_entry.confirm_receive">確認入庫</span></button>
                <button type="button" class="btn btn-outline-secondary" onclick="resetEntryForm()"><i class="fas fa-redo me-1"></i><span data-i18n="common.reset">重置</span></button>
            </div>
        </form>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="mb-0"><span data-i18n="pages.package_entry.today_records">今日錄入記錄</span> (<span id="todayCount">0</span><span data-i18n="pages.orders_quick_pack.items_unit">件</span>)</h6>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadTodayEntries()"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover table-sm">
            <thead>
                <tr>
                    <th data-i18n="pages.package_entry.tracking_no">快遞單號</th>
                    <th data-i18n="pages.orders.user">用戶</th>
                    <th data-i18n="pages.packages.weight">重量</th>
                    <th data-i18n="pages.packages.category">分類</th>
                    <th data-i18n="pages.packages.shelf_location">貨架</th>
                    <th data-i18n="pages.order_reviews.time">時間</th>
                </tr>
            </thead>
            <tbody id="todayBody">
                <tr><td colspan="6" class="text-center py-3 text-muted" data-i18n="common.no_records">暫無記錄</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

async function loadDropdowns() {
    try {
        const [wRes, cRes] = await Promise.all([
            apiRequest('GET', '/warehouses?limit=100'),
            apiRequest('GET', '/package-categories?limit=100')
        ]);
        const wSel = document.getElementById('warehouseId');
        (wRes.data || []).forEach(w => { wSel.innerHTML += `<option value="${w.id}">${w.name}</option>`; });
        const cSel = document.getElementById('categoryId');
        (cRes.data || []).forEach(c => { cSel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
    } catch(e) {}
}

document.getElementById('entryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        tracking_no: document.getElementById('trackingNo').value.trim(),
        user_id: document.getElementById('userId').value || undefined,
        warehouse_id: document.getElementById('warehouseId').value,
        weight: parseFloat(document.getElementById('weight').value) || 0,
        length: parseFloat(document.getElementById('length').value) || 0,
        width: parseFloat(document.getElementById('width').value) || 0,
        height: parseFloat(document.getElementById('height').value) || 0,
        category_id: document.getElementById('categoryId').value || undefined,
        shelf_location: document.getElementById('shelfLocation').value,
        quantity: parseInt(document.getElementById('quantity').value) || 1,
        remark: document.getElementById('remark').value,
        status: 'received'
    };
    if (!data.tracking_no) { showToast(_t('pages.package_entry.enter_tracking', '請輸入快遞單號'), 'error'); return; }
    if (!data.warehouse_id) { showToast(_t('pages.package_entry.select_warehouse', '請選擇倉庫'), 'error'); return; }
    try {
        await apiRequest('POST', '/packages', data);
        showToast(_t('packages.store_in_success', '入庫成功'), 'success');
        resetEntryForm();
        loadTodayEntries();
    } catch(e) {}
});

function resetEntryForm() {
    document.getElementById('entryForm').reset();
    document.getElementById('trackingNo').focus();
}

async function loadTodayEntries() {
    const today = new Date().toISOString().split('T')[0];
    try {
        const res = await apiRequest('GET', '/packages?start_date=' + today + '&status=received&limit=50');
        const data = res.data || [];
        document.getElementById('todayCount').textContent = res.total || data.length;
        const tbody = document.getElementById('todayBody');
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-3 text-muted">${_t('common.no_records', '暫無記錄')}</td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(p => `<tr>
            <td>${p.tracking_no}</td>
            <td>${p.user_name || '--'}</td>
            <td>${p.weight || 0} kg</td>
            <td>${p.category_name || '--'}</td>
            <td>${p.shelf_location || '--'}</td>
            <td>${formatDate(p.created_at)}</td>
        </tr>`).join('');
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
    loadDropdowns();
    loadTodayEntries();
    document.getElementById('trackingNo').focus();
});
</script>
{{end}}
