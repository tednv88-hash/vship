{{define "pages/users"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.users.title">用戶管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.users.search_user" placeholder="搜尋用戶名/郵件/手機...">
        </div>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="common.filter_all_status">全部狀態</option>
            <option value="active" data-i18n="common.status_enabled">啟用</option>
            <option value="inactive" data-i18n="common.status_disabled">停用</option>
        </select>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadUsers(1)">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.users.username">用戶名</th>
                    <th data-i18n="pages.users.email">郵件</th>
                    <th data-i18n="pages.users.phone">手機</th>
                    <th data-i18n="pages.users.member_level">會員等級</th>
                    <th data-i18n="pages.users.balance">餘額</th>
                    <th data-i18n="common.status">狀態</th>
                    <th data-i18n="pages.users.register_time">註冊時間</th>
                    <th data-i18n="common.operations">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Create/Edit Modal -->
<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle" data-i18n="pages.users.add_user">新增用戶</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" name="id" id="itemId">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.users.username">用戶名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.users.email">郵件 <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3" id="passwordField">
                        <label class="form-label" data-i18n="pages.users.password">密碼 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" name="password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.users.phone">手機</label>
                        <input type="text" class="form-control" name="phone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.users.member_level">會員等級</label>
                        <select class="form-select" name="member_level_id" id="levelSelect">
                            <option value="" data-i18n="pages.users.default_level">預設</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="common.status">狀態</label>
                        <select class="form-select" name="status">
                            <option value="active" data-i18n="common.status_enabled">啟用</option>
                            <option value="inactive" data-i18n="common.status_disabled">停用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
const limit = 20;
let editingId = null;

function loadUsers(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    const status = document.getElementById('filterStatus').value;
    const params = buildQueryParams({ search, status });
    loadTableData('/users', 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    return `<tr>
        <td>${item.username || '--'}</td>
        <td>${item.email || '--'}</td>
        <td>${item.phone || '--'}</td>
        <td>${item.member_level_name || (typeof I18n !== 'undefined' ? I18n.t('pages.users.default_level') : '預設')}</td>
        <td>${formatMoney(item.balance)}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>
            <div class="action-buttons">
                <button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        </td>
    </tr>`;
}

function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = (typeof I18n !== 'undefined' ? I18n.t('pages.users.add_user') : '新增用戶');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.users.add_user');
    document.getElementById('passwordField').style.display = 'block';
    resetForm('itemForm');
    openModal('formModal');
}

async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = (typeof I18n !== 'undefined' ? I18n.t('pages.users.edit_user') : '編輯用戶');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.users.edit_user');
    document.getElementById('passwordField').style.display = 'none';
    try {
        const res = await apiRequest('GET', '/users/' + id);
        populateForm('itemForm', res.data || res);
        openModal('formModal');
    } catch (e) {}
}

async function saveItem() {
    const data = getFormData('itemForm');
    try {
        if (editingId) {
            await apiRequest('PUT', '/users/' + editingId, data);
            showToast((typeof I18n !== 'undefined' ? I18n.t('common.update_success') : '更新成功'), 'success');
        } else {
            await apiRequest('POST', '/users', data);
            showToast((typeof I18n !== 'undefined' ? I18n.t('common.create_success') : '建立成功'), 'success');
        }
        closeModal('formModal');
        loadUsers(currentPage);
    } catch (e) {}
}

async function deleteItem(id) {
    if (!confirmDelete((typeof I18n !== 'undefined' ? I18n.t('pages.users.confirm_delete') : '確定要刪除此用戶嗎？'))) return;
    try {
        await apiRequest('DELETE', '/users/' + id);
        showToast((typeof I18n !== 'undefined' ? I18n.t('common.delete_success') : '刪除成功'), 'success');
        loadUsers(currentPage);
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', async function () {
    loadUsers(1);
    try {
        const levels = await apiRequest('GET', '/member-levels?limit=100');
        const sel = document.getElementById('levelSelect');
        (levels.data || levels || []).forEach(l => {
            sel.insertAdjacentHTML('beforeend', `<option value="${l.id}">${l.name}</option>`);
        });
    } catch (e) {}
});
document.getElementById('searchInput').addEventListener('input', debounce(() => loadUsers(1)));
document.getElementById('filterStatus').addEventListener('change', () => loadUsers(1));
</script>
{{end}}
