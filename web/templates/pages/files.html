{{define "pages/files"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.files.title">文件管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span></button>
    </div>
    <ul class="nav nav-tabs px-3" id="fileTabs">
        <li class="nav-item"><a class="nav-link active" href="#" onclick="switchTab('all')" data-i18n="pages.files.all_files">全部文件</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('deleted')" data-i18n="pages.files.recycle_bin">回收站</a></li>
    </ul>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.files.search_file" placeholder="搜尋文件名..."></div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.files.filename">文件名</th><th data-i18n="pages.files.file_type">類型</th><th data-i18n="pages.files.size">大小</th><th data-i18n="pages.files.upload_time">上傳時間</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.files.add_file">新增文件</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="itemForm"><input type="hidden" name="id">
        <div class="mb-3"><label class="form-label" data-i18n="pages.files.file_name_label">文件名稱</label><input type="text" class="form-control" name="file_name"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.files.file_url">文件 URL</label><input type="text" class="form-control" name="file_url" placeholder="https://..."></div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label" data-i18n="pages.files.file_type">文件類型</label><input type="text" class="form-control" name="file_type" data-i18n-placeholder="pages.files.file_type_placeholder" placeholder="如: image/png"></div>
            <div class="col-md-6 mb-3"><label class="form-label" data-i18n="pages.files.group">分組</label><select class="form-select" name="group_id" id="groupSelect"><option value="" data-i18n="pages.files.no_group">未分組</option></select></div>
        </div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
</div></div></div>
<script>
let currentPage = 1; const limit = 20; let editingId = null; let currentTab = 'all'; const API_PATH = '/files';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('#fileTabs .nav-link').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    loadData(1);
}
function getApiPath() { return currentTab === 'deleted' ? API_PATH + '/deleted' : API_PATH; }
function formatFileSize(bytes) {
    if (!bytes) return '--';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value });
    loadTableData(getApiPath(), 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    let actions = '';
    if (currentTab === 'deleted') {
        actions = `<button class="btn btn-sm btn-outline-success" onclick="restoreFile('${item.id}')"><i class="fas fa-undo"></i></button>`;
    } else {
        actions = `<button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>`;
    }
    return `<tr><td>${item.file_name||'--'}</td><td>${item.file_type||'--'}</td><td>${formatFileSize(item.file_size)}</td><td>${formatDate(item.created_at)}</td><td><div class="action-buttons">${actions}</div></td></tr>`;
}
function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.files.add_file', '新增文件');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.files.add_file');
    resetForm('itemForm'); openModal('formModal');
}
async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.files.edit_file', '編輯文件');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.files.edit_file');
    try { const res = await apiRequest('GET', API_PATH+'/'+id); populateForm('itemForm', res.data||res); openModal('formModal'); } catch(e){}
}
async function saveItem() { const data = getFormData('itemForm'); try { if(editingId){await apiRequest('PUT',API_PATH+'/'+editingId,data);showToast(_t('common.update_success','更新成功'));}else{await apiRequest('POST',API_PATH,data);showToast(_t('common.create_success','建立成功'));} closeModal('formModal'); loadData(currentPage); } catch(e){} }
async function deleteItem(id) { if(!confirmDelete())return; try{await apiRequest('DELETE',API_PATH+'/'+id);showToast(_t('common.delete_success','刪除成功'));loadData(currentPage);}catch(e){} }
async function restoreFile(id) { try{await apiRequest('PUT',API_PATH+'/'+id+'/restore');showToast(_t('pages.files.restore_success','還原成功'));loadData(currentPage);}catch(e){} }
async function loadGroups() {
    try {
        const res = await apiRequest('GET', '/file-groups?limit=100');
        const items = res.data || res || [];
        const sel = document.getElementById('groupSelect');
        items.forEach(g => sel.insertAdjacentHTML('beforeend', `<option value="${g.id}">${g.name}</option>`));
    } catch(e){}
}
document.addEventListener('DOMContentLoaded', () => { loadGroups(); loadData(1); });
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
