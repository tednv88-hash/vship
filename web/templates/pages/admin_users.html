{{define "pages/admin_users"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.admin_users.title">管理員列表</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="pages.admin_users.add_admin">新增管理員</span></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.admin_users.search_placeholder" placeholder="搜尋管理員...">
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.admin_users.username">用戶名</th><th data-i18n="pages.admin_users.email">郵箱</th><th data-i18n="pages.admin_users.role">角色</th><th data-i18n="pages.admin_users.last_login">最後登入</th><th data-i18n="common.status">狀態</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.admin_users.add_admin">新增管理員</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><form id="dataForm"><input type="hidden" id="editId">
            <div class="mb-3"><label class="form-label" data-i18n="pages.admin_users.username">用戶名</label><input type="text" class="form-control" id="user_name" required></div>
            <div class="mb-3"><label class="form-label" data-i18n="pages.admin_users.email">郵箱</label><input type="email" class="form-control" id="email" required></div>
            <div class="mb-3" id="passwordGroup"><label class="form-label" data-i18n="pages.admin_users.password">密碼</label><input type="password" class="form-control" id="password"></div>
            <div class="mb-3"><label class="form-label" data-i18n="pages.admin_users.role">角色</label><select class="form-select" id="role_id"><option value="" data-i18n="common.please_select">請選擇</option></select></div>
            <div class="mb-3"><label class="form-label" data-i18n="common.status">狀態</label><select class="form-select" id="status"><option value="active" data-i18n="common.enable">啟用</option><option value="inactive" data-i18n="common.disable">停用</option></select></div>
        </form></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
    </div></div>
</div>
<script>
const API_PATH = '/users'; let currentPage = 1; const limit = 20;
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
async function loadRoles() { try { const res = await apiRequest('GET', '/admin-roles?limit=50');
    const sel = document.getElementById('role_id'); (res.data || []).forEach(r => { sel.innerHTML += `<option value="${r.id}">${r.name}</option>`; }); } catch(e) {} }
function loadData(page) { currentPage = page; const search = document.getElementById('searchInput').value;
    const params = buildQueryParams({ search, is_admin: true }); loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params); }
function renderRow(item) { return `<tr><td>${item.user_name || item.name || '--'}</td><td>${item.email || '--'}</td>
    <td>${item.role_name || '--'}</td><td>${formatDate(item.last_login_at || item.updated_at)}</td><td>${getStatusBadge(item.status)}</td>
    <td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
    <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`; }
function openCreateModal() {
    document.getElementById('modalTitle').textContent = _t('pages.admin_users.add_admin', '新增管理員');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.admin_users.add_admin');
    document.getElementById('editId').value = '';
    resetForm('dataForm'); document.getElementById('passwordGroup').style.display = 'block'; openModal('formModal'); }
async function editItem(id) { try { const res = await apiRequest('GET', API_PATH + '/' + id); const d = res.data || res;
    document.getElementById('editId').value = d.id; document.getElementById('user_name').value = d.user_name || d.name || '';
    document.getElementById('email').value = d.email || ''; document.getElementById('role_id').value = d.role_id || '';
    document.getElementById('status').value = d.status || 'active'; document.getElementById('password').value = '';
    document.getElementById('modalTitle').textContent = _t('pages.admin_users.edit_admin', '編輯管理員');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.admin_users.edit_admin');
    openModal('formModal'); } catch(e) {} }
async function saveItem() { const id = document.getElementById('editId').value;
    const data = { user_name: document.getElementById('user_name').value, email: document.getElementById('email').value,
        role_id: document.getElementById('role_id').value, status: document.getElementById('status').value };
    const pwd = document.getElementById('password').value; if (pwd) data.password = pwd;
    try { if (id) { await apiRequest('PUT', API_PATH + '/' + id, data); } else { if (!pwd) { showToast(_t('pages.admin_users.please_enter_password', '請輸入密碼'), 'error'); return; } await apiRequest('POST', API_PATH, data); }
    showToast(_t('common.save_success', '儲存成功'), 'success'); closeModal('formModal'); loadData(currentPage); } catch(e) {} }
async function deleteItem(id) { if (!confirmDelete(_t('pages.admin_users.confirm_delete', '確定刪除此管理員嗎？'))) return;
    try { await apiRequest('DELETE', API_PATH + '/' + id); showToast(_t('common.delete_success', '刪除成功'), 'success'); loadData(currentPage); } catch(e) {} }
document.addEventListener('DOMContentLoaded', () => { loadRoles(); loadData(1); });
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
