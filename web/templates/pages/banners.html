{{define "pages/banners"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.banners.title">輪播圖管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.banners.preview">預覽</th><th data-i18n="pages.banners.banner_title">標題</th><th data-i18n="pages.banners.link">連結</th><th data-i18n="common.sort">排序</th><th data-i18n="common.status">狀態</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.banners.add_banner">新增輪播圖</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="itemForm"><input type="hidden" name="id">
        <div class="mb-3"><label class="form-label" data-i18n="pages.banners.banner_title">標題 <span class="text-danger">*</span></label><input type="text" class="form-control" name="title" required></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.banners.image_url">圖片網址 <span class="text-danger">*</span></label><input type="url" class="form-control" name="image_url" required placeholder="https://"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.banners.link_url">連結網址</label><input type="url" class="form-control" name="link_url" placeholder="https://"></div>
        <div class="mb-3"><label class="form-label" data-i18n="common.sort">排序</label><input type="number" class="form-control" name="sort_order" data-type="number" value="0"></div>
        <div class="mb-3"><label class="form-label" data-i18n="common.status">狀態</label><select class="form-select" name="status"><option value="active" data-i18n="common.enable">啟用</option><option value="inactive" data-i18n="common.disable">停用</option></select></div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
</div></div></div>
<script>
let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/banners';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
function loadData(page) { currentPage = page; loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit); }
function renderRow(item) {
    const preview = item.image_url ? `<img src="${item.image_url}" alt="${item.title||''}" style="height:40px;border-radius:4px;object-fit:cover;">` : '<span class="text-muted">--</span>';
    const link = item.link_url ? `<a href="${item.link_url}" target="_blank" class="text-truncate d-inline-block" style="max-width:150px">${item.link_url}</a>` : '--';
    return `<tr><td>${preview}</td><td>${item.title||'--'}</td><td>${link}</td><td>${item.sort_order||0}</td><td>${getStatusBadge(item.status)}</td><td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
}
function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.banners.add_banner', '新增輪播圖');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.banners.add_banner');
    resetForm('itemForm'); openModal('formModal');
}
async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.banners.edit_banner', '編輯輪播圖');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.banners.edit_banner');
    try { const res = await apiRequest('GET', API_PATH+'/'+id); populateForm('itemForm', res.data||res); openModal('formModal'); } catch(e){}
}
async function saveItem() { const data = getFormData('itemForm'); try { if(editingId){await apiRequest('PUT',API_PATH+'/'+editingId,data);showToast(_t('common.update_success','更新成功'));}else{await apiRequest('POST',API_PATH,data);showToast(_t('common.create_success','建立成功'));} closeModal('formModal'); loadData(currentPage); } catch(e){} }
async function deleteItem(id) { if(!confirmDelete(_t('pages.banners.confirm_delete','確定要刪除此輪播圖嗎？')))return; try{await apiRequest('DELETE',API_PATH+'/'+id);showToast(_t('common.delete_success','刪除成功'));loadData(currentPage);}catch(e){} }
document.addEventListener('DOMContentLoaded', () => loadData(1));
</script>
{{end}}
