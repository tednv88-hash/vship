{{define "pages/warehouse_clerk_reviews"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.warehouse_clerk_reviews.title">倉管評價</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.warehouse_clerk_reviews.search" placeholder="搜尋倉管員/用戶..."></div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.warehouse_clerk_reviews.clerk">倉管員</th>
                <th data-i18n="pages.warehouse_clerk_reviews.user">用戶</th>
                <th data-i18n="pages.warehouse_clerk_reviews.order">訂單</th>
                <th data-i18n="pages.warehouse_clerk_reviews.rating">評分</th>
                <th data-i18n="pages.warehouse_clerk_reviews.content">內容</th>
                <th data-i18n="common.time">時間</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<script>
let currentPage = 1; const limit = 20; const API_PATH = '/warehouse-clerks/reviews';

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderStars(rating) {
    const n = parseInt(rating) || 0;
    return '<span class="text-warning">' + '★'.repeat(n) + '</span>' + '<span class="text-muted">' + '★'.repeat(5 - n) + '</span>';
}

function renderRow(item) {
    return `<tr>
        <td>${item.clerk_name || '--'}</td>
        <td>${item.user_name || '--'}</td>
        <td>${item.order_no || '--'}</td>
        <td>${renderStars(item.rating)}</td>
        <td>${item.content || '--'}</td>
        <td>${formatDate(item.created_at)}</td>
    </tr>`;
}

document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
