{{define "pages/user_orders"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.user_orders.title">會員訂單</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadOrders(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.user_orders.search_placeholder" placeholder="搜尋用戶名/手機號/訂單號...">
        </div>
        <select class="form-select" id="filterLevel" style="max-width:150px;">
            <option value="" data-i18n="common.filter_all_level">全部等級</option>
        </select>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="common.filter_all_status">全部狀態</option>
            <option value="pending" data-i18n="common.status_pending">待處理</option>
            <option value="processing" data-i18n="common.status_processing">處理中</option>
            <option value="completed" data-i18n="common.status_completed">已完成</option>
            <option value="cancelled" data-i18n="common.status_cancelled">已取消</option>
        </select>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.user_orders.order_no">訂單編號</th>
                    <th data-i18n="common.user">用戶</th>
                    <th data-i18n="pages.user_orders.member_level">會員等級</th>
                    <th data-i18n="pages.user_orders.route">線路</th>
                    <th data-i18n="pages.user_orders.package_count">包裹數</th>
                    <th data-i18n="pages.user_orders.amount">金額</th>
                    <th data-i18n="pages.user_orders.payment">付款</th>
                    <th data-i18n="common.status">狀態</th>
                    <th data-i18n="common.created_at">時間</th>
                    <th data-i18n="common.actions">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"><tr><td colspan="10" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<script>
let currentPage = 1; const limit = 20;
async function loadLevels() {
    try { const res = await apiRequest('GET', '/member-levels?limit=50');
        const sel = document.getElementById('filterLevel');
        (res.data || []).forEach(l => { sel.innerHTML += `<option value="${l.id}">${l.name}</option>`; });
    } catch(e) {}
}
function loadOrders(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    const level = document.getElementById('filterLevel').value;
    const status = document.getElementById('filterStatus').value;
    const params = buildQueryParams({ search, member_level_id: level, status });
    loadTableData('/orders', 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    return `<tr>
        <td><a href="/orders/${item.id}">${item.order_no || '--'}</a></td>
        <td>${item.user_name || '--'}</td><td>${getStatusBadge(item.member_level || 'normal')}</td>
        <td>${item.route_name || '--'}</td><td>${item.package_count || 0}</td>
        <td>${formatMoney(item.total_amount)}</td><td>${getStatusBadge(item.payment_status)}</td>
        <td>${getStatusBadge(item.status)}</td><td>${formatDate(item.created_at)}</td>
        <td><a href="/orders/${item.id}" class="btn btn-sm btn-outline-primary"><i class="fas fa-eye"></i></a></td>
    </tr>`;
}
document.addEventListener('DOMContentLoaded', () => { loadLevels(); loadOrders(1); });
document.getElementById('searchInput').addEventListener('input', debounce(() => loadOrders(1)));
document.getElementById('filterLevel').addEventListener('change', () => loadOrders(1));
document.getElementById('filterStatus').addEventListener('change', () => loadOrders(1));
</script>
{{end}}
