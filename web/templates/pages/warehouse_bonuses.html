{{define "pages/warehouse_bonuses"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.warehouse_bonuses.title">獎金管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.warehouse_bonuses.search_warehouse" placeholder="搜尋倉庫..."></div>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="common.filter_all_status">全部狀態</option>
            <option value="pending" data-i18n="pages.warehouse_bonuses.status_pending">待發放</option>
            <option value="paid" data-i18n="pages.warehouse_bonuses.status_paid">已發放</option>
        </select>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.warehouse_bonuses.warehouse">倉庫</th>
                <th data-i18n="pages.warehouse_bonuses.amount">金額</th>
                <th data-i18n="pages.warehouse_bonuses.type">類型</th>
                <th data-i18n="pages.warehouse_bonuses.description">說明</th>
                <th data-i18n="pages.warehouse_bonuses.month">月份</th>
                <th data-i18n="common.status">狀態</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.warehouse_bonuses.add_bonus">新增獎金</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
        <form id="itemForm">
            <input type="hidden" name="id" id="itemId">
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.warehouse_bonuses.warehouse">倉庫</label>
                <select class="form-select" name="warehouse_id" id="warehouseSelect">
                    <option value="" data-i18n="common.please_select">請選擇</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.warehouse_bonuses.amount">金額 <span class="text-danger">*</span></label>
                <input type="number" class="form-control" name="amount" required step="0.01" min="0">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.warehouse_bonuses.type">類型</label>
                <select class="form-select" name="type">
                    <option value="service" data-i18n="pages.warehouse_bonuses.type_service">服務獎金</option>
                    <option value="performance" data-i18n="pages.warehouse_bonuses.type_performance">績效獎金</option>
                    <option value="other" data-i18n="pages.warehouse_bonuses.type_other">其他</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.warehouse_bonuses.description">說明</label>
                <input type="text" class="form-control" name="description">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.warehouse_bonuses.month">月份</label>
                <input type="month" class="form-control" name="month">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="common.status">狀態</label>
                <select class="form-select" name="status">
                    <option value="pending" data-i18n="pages.warehouse_bonuses.status_pending">待發放</option>
                    <option value="paid" data-i18n="pages.warehouse_bonuses.status_paid">已發放</option>
                </select>
            </div>
        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
    </div>
</div></div></div>

<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/warehouse/bonuses';

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, status: document.getElementById('filterStatus').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    let actions = `<button class="btn btn-sm btn-outline-primary me-1" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>`;
    if (item.status === 'pending') {
        actions += `<button class="btn btn-sm btn-outline-success" onclick="payItem('${item.id}')"><i class="fas fa-money-bill-wave"></i> ${_t('pages.warehouse_bonuses.status_paid', '發放')}</button>`;
    }
    return `<tr>
        <td>${item.warehouse_name || '--'}</td>
        <td>${formatMoney(item.amount)}</td>
        <td>${item.type || '--'}</td>
        <td>${item.description || '--'}</td>
        <td>${item.month || '--'}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td><div class="action-buttons">${actions}</div></td>
    </tr>`;
}

function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.warehouse_bonuses.add_bonus', '新增獎金');
    resetForm('itemForm');
    openModal('formModal');
}

async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.warehouse_bonuses.edit_bonus', '編輯獎金');
    try {
        const res = await apiRequest('GET', API_PATH + '/' + id);
        populateForm('itemForm', res.data || res);
        openModal('formModal');
    } catch(e) {}
}

async function saveItem() {
    const data = getFormData('itemForm');
    try {
        if (editingId) {
            await apiRequest('PUT', API_PATH + '/' + editingId, data);
            showToast(_t('common.update_success', '更新成功'), 'success');
        } else {
            await apiRequest('POST', API_PATH, data);
            showToast(_t('common.create_success', '建立成功'), 'success');
        }
        closeModal('formModal');
        loadData(currentPage);
    } catch(e) {}
}

async function payItem(id) {
    if (!confirm(_t('pages.warehouse_bonuses.confirm_pay', '確定要發放此獎金嗎？'))) return;
    try {
        await apiRequest('PUT', API_PATH + '/' + id + '/pay');
        showToast(_t('pages.warehouse_bonuses.paid_success', '已發放'), 'success');
        loadData(currentPage);
    } catch(e) {}
}

async function loadWarehouses() {
    try {
        const res = await apiRequest('GET', '/warehouses?limit=100');
        const items = res.data || res || [];
        const sel = document.getElementById('warehouseSelect');
        items.forEach(w => sel.insertAdjacentHTML('beforeend', `<option value="${w.id}">${w.name}</option>`));
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => { loadData(1); loadWarehouses(); });
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
document.getElementById('filterStatus').addEventListener('change', () => loadData(1));
</script>
{{end}}
