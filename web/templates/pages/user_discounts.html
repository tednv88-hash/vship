{{define "pages/user_discounts"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.user_discounts.title">折扣列表</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.user_discounts.search_placeholder" placeholder="搜尋用戶名..."></div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="common.user">用戶</th>
                <th data-i18n="pages.user_discounts.route">線路</th>
                <th data-i18n="pages.user_discounts.discount_rate">折扣率</th>
                <th data-i18n="common.remark">備註</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.user_discounts.add_discount">新增折扣</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="itemForm"><input type="hidden" name="id">
        <div class="mb-3"><label class="form-label" data-i18n="common.user">用戶</label><select class="form-select" name="user_id" id="userSelect"><option value="" data-i18n="pages.user_discounts.select_user">請選擇用戶</option></select></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.user_discounts.route">線路</label><select class="form-select" name="route_id" id="routeSelect"><option value="" data-i18n="pages.user_discounts.select_route">請選擇線路</option></select></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.user_discounts.discount_rate">折扣率</label><input type="number" class="form-control" name="discount_rate" step="0.01" data-type="number" data-i18n-placeholder="pages.user_discounts.discount_rate_hint" placeholder="如: 0.85 表示 85 折"></div>
        <div class="mb-3"><label class="form-label" data-i18n="common.remark">備註</label><input type="text" class="form-control" name="remark"></div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
</div></div></div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/user-discounts';
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    const rate = item.discount_rate ? `${(item.discount_rate * 100).toFixed(0)}%` : '--';
    return `<tr><td>${item.user_name||'--'}</td><td>${item.route_name||'--'}</td><td>${rate}</td><td>${item.remark||'--'}</td><td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
}
function openCreateModal() { editingId = null; document.getElementById('modalTitle').textContent = _t('pages.user_discounts.add_discount', '新增折扣'); resetForm('itemForm'); openModal('formModal'); }
async function editItem(id) { editingId = id; document.getElementById('modalTitle').textContent = _t('pages.user_discounts.edit_discount', '編輯折扣'); try { const res = await apiRequest('GET', API_PATH+'/'+id); populateForm('itemForm', res.data||res); openModal('formModal'); } catch(e){} }
async function saveItem() { const data = getFormData('itemForm'); try { if(editingId){await apiRequest('PUT',API_PATH+'/'+editingId,data);showToast(_t('common.update_success','更新成功'));}else{await apiRequest('POST',API_PATH,data);showToast(_t('common.create_success','建立成功'));} closeModal('formModal'); loadData(currentPage); } catch(e){} }
async function deleteItem(id) { if(!confirmDelete())return; try{await apiRequest('DELETE',API_PATH+'/'+id);showToast(_t('common.delete_success','刪除成功'));loadData(currentPage);}catch(e){} }
async function loadSelectData() {
    try {
        const [users, routes] = await Promise.all([apiRequest('GET', '/users?limit=200'), apiRequest('GET', '/shipping-routes?limit=200')]);
        const userSel = document.getElementById('userSelect');
        (users.data || users || []).forEach(u => userSel.insertAdjacentHTML('beforeend', `<option value="${u.id}">${u.username}</option>`));
        const routeSel = document.getElementById('routeSelect');
        (routes.data || routes || []).forEach(r => routeSel.insertAdjacentHTML('beforeend', `<option value="${r.id}">${r.name}</option>`));
    } catch(e){}
}
document.addEventListener('DOMContentLoaded', () => { loadSelectData(); loadData(1); });
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
