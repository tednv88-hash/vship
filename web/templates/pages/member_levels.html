{{define "pages/member_levels"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.member_levels.title">會員等級</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.member_levels.level_name">等級名稱</th>
                <th data-i18n="pages.member_levels.level_code">等級代碼</th>
                <th data-i18n="pages.member_levels.discount_rate">折扣率 (%)</th>
                <th data-i18n="pages.package_categories.sort_order">排序</th>
                <th data-i18n="common.status">狀態</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.member_levels.add_level">新增會員等級</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="itemForm"><input type="hidden" name="id">
        <div class="mb-3"><label class="form-label" data-i18n="pages.member_levels.level_name">等級名稱 <span class="text-danger">*</span></label><input type="text" class="form-control" name="name" required></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.member_levels.level_code">等級代碼</label><input type="text" class="form-control" name="code"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.member_levels.discount_rate">折扣率 (%)</label><input type="number" class="form-control" name="discount_rate" step="0.1" data-type="number" data-i18n-placeholder="pages.member_levels.discount_hint" placeholder="如: 5 代表 5% 折扣"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.member_levels.min_spending">最低消費金額</label><input type="number" class="form-control" name="min_spending" step="0.01" data-type="number"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.package_categories.sort_order">排序</label><input type="number" class="form-control" name="sort_order" data-type="number" value="0"></div>
        <div class="mb-3"><label class="form-label" data-i18n="common.description">描述</label><textarea class="form-control" name="description" rows="2"></textarea></div>
        <div class="mb-3"><label class="form-label" data-i18n="common.status">狀態</label><select class="form-select" name="status"><option value="active" data-i18n="common.status_active">啟用</option><option value="inactive" data-i18n="common.status_inactive">停用</option></select></div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
</div></div></div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/member-levels';
function loadData(page) { currentPage = page; loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit); }
function renderRow(item) { return `<tr><td>${item.name||'--'}</td><td>${item.code||'--'}</td><td>${item.discount_rate||0}%</td><td>${item.sort_order||0}</td><td>${getStatusBadge(item.status)}</td><td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`; }
function openCreateModal() { editingId = null; document.getElementById('modalTitle').textContent = _t('pages.member_levels.add_level', '新增會員等級'); resetForm('itemForm'); openModal('formModal'); }
async function editItem(id) { editingId = id; document.getElementById('modalTitle').textContent = _t('pages.member_levels.edit_level', '編輯會員等級'); try { const res = await apiRequest('GET', API_PATH+'/'+id); populateForm('itemForm', res.data||res); openModal('formModal'); } catch(e){} }
async function saveItem() { const data = getFormData('itemForm'); try { if(editingId){await apiRequest('PUT',API_PATH+'/'+editingId,data);showToast(_t('common.update_success','更新成功'));}else{await apiRequest('POST',API_PATH,data);showToast(_t('common.create_success','建立成功'));} closeModal('formModal'); loadData(currentPage); } catch(e){} }
async function deleteItem(id) { if(!confirmDelete())return; try{await apiRequest('DELETE',API_PATH+'/'+id);showToast(_t('common.delete_success','刪除成功'));loadData(currentPage);}catch(e){} }
document.addEventListener('DOMContentLoaded', () => loadData(1));
</script>
{{end}}
