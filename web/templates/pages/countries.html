{{define "pages/countries"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.countries.title">國家管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.countries.search_country" placeholder="搜尋國家名稱/代碼...">
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.countries.country_code">國家代碼</th>
                    <th data-i18n="pages.countries.english_name">英文名稱</th>
                    <th data-i18n="pages.countries.chinese_name">中文名稱</th>
                    <th data-i18n="pages.countries.phone_code">電話區號</th>
                    <th data-i18n="common.status">狀態</th>
                    <th data-i18n="common.actions">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle" data-i18n="pages.countries.add_country">新增國家</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" name="id" id="itemId">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.countries.country_code">國家代碼 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="code" required maxlength="3" data-i18n-placeholder="pages.countries.code_placeholder" placeholder="如: CN, US, JP">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.countries.english_name">英文名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.countries.chinese_name">中文名稱</label>
                        <input type="text" class="form-control" name="name_zh">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="pages.countries.phone_code">電話區號</label>
                        <input type="text" class="form-control" name="phone_code" data-i18n-placeholder="pages.countries.phone_code_placeholder" placeholder="如: +86">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="common.status">狀態</label>
                        <select class="form-select" name="status">
                            <option value="active" data-i18n="common.enable">啟用</option>
                            <option value="inactive" data-i18n="common.disable">停用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1; const limit = 20; let editingId = null;
const API_PATH = '/countries';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function loadData(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, buildQueryParams({ search }));
}
function renderRow(item) {
    return `<tr>
        <td><strong>${item.code || '--'}</strong></td>
        <td>${item.name || '--'}</td>
        <td>${item.name_zh || '--'}</td>
        <td>${item.phone_code || '--'}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td>
            <div class="action-buttons">
                <button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        </td>
    </tr>`;
}
function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.countries.add_country', '新增國家');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.countries.add_country');
    resetForm('itemForm'); openModal('formModal');
}
async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.countries.edit_country', '編輯國家');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.countries.edit_country');
    try { const res = await apiRequest('GET', API_PATH + '/' + id); populateForm('itemForm', res.data || res); openModal('formModal'); } catch (e) {}
}
async function saveItem() { const data = getFormData('itemForm'); try { if (editingId) { await apiRequest('PUT', API_PATH + '/' + editingId, data); showToast(_t('common.update_success','更新成功')); } else { await apiRequest('POST', API_PATH, data); showToast(_t('common.create_success','建立成功')); } closeModal('formModal'); loadData(currentPage); } catch (e) {} }
async function deleteItem(id) { if (!confirmDelete(_t('pages.countries.confirm_delete','確定要刪除此國家嗎？'))) return; try { await apiRequest('DELETE', API_PATH + '/' + id); showToast(_t('common.delete_success','刪除成功')); loadData(currentPage); } catch (e) {} }
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
