{{define "pages/warehouse_capital"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.warehouse_capital.title">資金明細</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <select class="form-select" id="filterWarehouse" style="max-width:200px;">
            <option value="" data-i18n="common.filter_all_warehouse">全部倉庫</option>
        </select>
        <select class="form-select" id="filterType" style="max-width:150px;">
            <option value="" data-i18n="common.filter_all_type">全部類型</option>
            <option value="income" data-i18n="pages.warehouse_capital.type_income">收入</option>
            <option value="expense" data-i18n="pages.warehouse_capital.type_expense">支出</option>
            <option value="withdrawal" data-i18n="pages.warehouse_capital.type_withdrawal">提現</option>
            <option value="bonus" data-i18n="pages.warehouse_capital.type_bonus">獎金</option>
        </select>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.warehouse_capital.warehouse">倉庫</th>
                <th data-i18n="pages.warehouse_capital.amount">金額</th>
                <th data-i18n="pages.warehouse_capital.balance">餘額</th>
                <th data-i18n="pages.warehouse_capital.type">類型</th>
                <th data-i18n="pages.warehouse_capital.description">描述</th>
                <th data-i18n="common.time">時間</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<script>
let currentPage = 1; const limit = 20; const API_PATH = '/warehouse/capital';

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ warehouse_id: document.getElementById('filterWarehouse').value, type: document.getElementById('filterType').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    const amountClass = parseFloat(item.amount) >= 0 ? 'text-success' : 'text-danger';
    return `<tr>
        <td>${item.warehouse_name || '--'}</td>
        <td class="${amountClass}">${formatMoney(item.amount)}</td>
        <td>${formatMoney(item.balance)}</td>
        <td>${item.type || '--'}</td>
        <td>${item.description || '--'}</td>
        <td>${formatDate(item.created_at)}</td>
    </tr>`;
}

async function loadWarehouses() {
    try {
        const res = await apiRequest('GET', '/warehouses?limit=100');
        const items = res.data || res || [];
        const sel = document.getElementById('filterWarehouse');
        items.forEach(w => sel.insertAdjacentHTML('beforeend', `<option value="${w.id}">${w.name}</option>`));
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => { loadData(1); loadWarehouses(); });
document.getElementById('filterWarehouse').addEventListener('change', () => loadData(1));
document.getElementById('filterType').addEventListener('change', () => loadData(1));
</script>
{{end}}
