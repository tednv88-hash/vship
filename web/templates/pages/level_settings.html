{{define "pages/level_settings"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.level_settings.title">等級設置</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="pages.level_settings.add_level">新增等級</span></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="common.sort">排序</th>
                    <th data-i18n="pages.level_settings.level_name">等級名稱</th>
                    <th data-i18n="pages.level_settings.upgrade_condition">升級條件</th>
                    <th data-i18n="pages.level_settings.discount_rate">折扣率</th>
                    <th data-i18n="pages.level_settings.free_storage_days">免費存放天數</th>
                    <th data-i18n="common.status">狀態</th>
                    <th data-i18n="common.actions">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
</div>
<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.level_settings.add_level">新增等級</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="dataForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3"><label class="form-label" data-i18n="pages.level_settings.level_name">等級名稱</label><input type="text" class="form-control" id="name" required></div>
                    <div class="mb-3"><label class="form-label" data-i18n="pages.level_settings.upgrade_amount">升級所需消費金額</label><input type="number" class="form-control" id="upgrade_amount" step="0.01" min="0" value="0"></div>
                    <div class="mb-3"><label class="form-label" data-i18n="pages.level_settings.upgrade_orders">升級所需訂單數</label><input type="number" class="form-control" id="upgrade_orders" min="0" value="0"></div>
                    <div class="mb-3"><label class="form-label" data-i18n="pages.level_settings.discount_rate_pct">折扣率(%)</label><input type="number" class="form-control" id="discount_rate" step="0.1" min="0" max="100" value="100"></div>
                    <div class="mb-3"><label class="form-label" data-i18n="pages.level_settings.free_storage_days">免費存放天數</label><input type="number" class="form-control" id="free_storage_days" min="0" value="30"></div>
                    <div class="mb-3"><label class="form-label" data-i18n="common.sort">排序</label><input type="number" class="form-control" id="sort_order" min="0" value="0"></div>
                    <div class="mb-3"><label class="form-label" data-i18n="common.status">狀態</label>
                        <select class="form-select" id="status"><option value="active" data-i18n="common.enable">啟用</option><option value="inactive" data-i18n="common.disable">停用</option></select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
            </div>
        </div>
    </div>
</div>
<script>
const API_PATH = '/member-levels';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function loadData() {
    loadTableData(API_PATH, 'tableBody', renderRow, null, 1, 100, '');
}
function renderRow(item) {
    return `<tr>
        <td>${item.sort_order || 0}</td><td>${item.name}</td>
        <td>${_t('pages.level_settings.spend', '消費')} ${formatMoney(item.upgrade_amount || 0)} / ${item.upgrade_orders || 0} ${_t('pages.level_settings.orders_unit', '單')}</td>
        <td>${item.discount_rate || 100}%</td><td>${item.free_storage_days || 0} ${_t('pages.level_settings.days', '天')}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td><div class="action-buttons">
            <button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
        </div></td>
    </tr>`;
}
function openCreateModal() {
    document.getElementById('modalTitle').textContent = _t('pages.level_settings.add_level', '新增等級');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.level_settings.add_level');
    document.getElementById('editId').value = '';
    resetForm('dataForm');
    openModal('formModal');
}
async function editItem(id) {
    try {
        const res = await apiRequest('GET', API_PATH + '/' + id);
        const d = res.data || res;
        document.getElementById('editId').value = d.id;
        document.getElementById('name').value = d.name || '';
        document.getElementById('upgrade_amount').value = d.upgrade_amount || 0;
        document.getElementById('upgrade_orders').value = d.upgrade_orders || 0;
        document.getElementById('discount_rate').value = d.discount_rate || 100;
        document.getElementById('free_storage_days').value = d.free_storage_days || 30;
        document.getElementById('sort_order').value = d.sort_order || 0;
        document.getElementById('status').value = d.status || 'active';
        document.getElementById('modalTitle').textContent = _t('pages.level_settings.edit_level', '編輯等級');
        document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.level_settings.edit_level');
        openModal('formModal');
    } catch(e) {}
}
async function saveItem() {
    const id = document.getElementById('editId').value;
    const data = getFormData('dataForm');
    data.upgrade_amount = parseFloat(data.upgrade_amount) || 0;
    data.upgrade_orders = parseInt(data.upgrade_orders) || 0;
    data.discount_rate = parseFloat(data.discount_rate) || 100;
    data.free_storage_days = parseInt(data.free_storage_days) || 0;
    data.sort_order = parseInt(data.sort_order) || 0;
    try {
        if (id) { await apiRequest('PUT', API_PATH + '/' + id, data); }
        else { await apiRequest('POST', API_PATH, data); }
        showToast(_t('common.save_success', '儲存成功'), 'success');
        closeModal('formModal'); loadData();
    } catch(e) {}
}
async function deleteItem(id) {
    if (!confirmDelete(_t('pages.level_settings.confirm_delete', '確定要刪除此等級嗎？'))) return;
    try { await apiRequest('DELETE', API_PATH + '/' + id); showToast(_t('common.delete_success', '刪除成功'), 'success'); loadData(); } catch(e) {}
}
document.addEventListener('DOMContentLoaded', loadData);
</script>
{{end}}
