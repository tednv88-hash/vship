{{define "pages/reset_password"}}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">重設密碼 - vShip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/login.css" rel="stylesheet">
    <style>
        .vlogin-lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
        }
        .vlogin-lang-switcher .dropdown-toggle {
            background: rgba(255,255,255,0.9);
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            color: #5f6368;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .vlogin-lang-switcher .dropdown-toggle:hover {
            background: #fff;
            border-color: #bdc1c6;
        }
        .vlogin-lang-switcher .dropdown-menu {
            min-width: 160px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            border: 1px solid #dadce0;
        }
        .vlogin-lang-switcher .dropdown-item {
            font-size: 13px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .vlogin-lang-switcher .dropdown-item .lang-check {
            display: none;
            color: #05ce78;
        }
        .vlogin-lang-switcher .dropdown-item.active .lang-check {
            display: inline;
        }
    </style>
</head>
<body class="login-page">

    <!-- Language Switcher -->
    <div class="vlogin-lang-switcher dropdown">
        <button class="dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-globe2"></i>
            <span id="currentLangLabel">繁體中文</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item lang-option" href="javascript:void(0)" data-lang="zh">繁體中文 <i class="bi bi-check-lg lang-check"></i></a></li>
            <li><a class="dropdown-item lang-option" href="javascript:void(0)" data-lang="zh-CN">简体中文 <i class="bi bi-check-lg lang-check"></i></a></li>
            <li><a class="dropdown-item lang-option" href="javascript:void(0)" data-lang="en">English <i class="bi bi-check-lg lang-check"></i></a></li>
        </ul>
    </div>

    <div class="vlogin-wrapper">
        <div class="vlogin-main">
            <div class="vlogin-card" style="max-width: 640px;">
                <!-- Card Left: Logo + Title -->
                <div class="vlogin-card-left" style="flex: 0 0 35%; max-width: 35%;">
                    <div class="vlogin-logo">
                        <i class="bi bi-truck"></i>
                    </div>
                    <h1 class="vlogin-title" data-i18n="reset_password.title">重設密碼</h1>
                    <p class="vlogin-subtitle" data-i18n="reset_password.subtitle">設定您的新密碼</p>
                </div>

                <!-- Card Right: Form Area -->
                <div class="vlogin-card-right">

                    <!-- Reset Form -->
                    <div id="resetFormSection">
                        <form id="resetForm">
                            <div class="vlogin-form-group">
                                <label for="newPassword" data-i18n="reset_password.new_password">新密碼</label>
                                <div class="input-wrapper">
                                    <input type="password" id="newPassword" name="new_password" required data-i18n-placeholder="reset_password.new_password_placeholder" placeholder="至少 6 位字元" minlength="6" autocomplete="new-password">
                                    <button class="toggle-password" type="button" onclick="togglePwd('newPassword', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="vlogin-form-group">
                                <label for="confirmPassword" data-i18n="reset_password.confirm_password">確認新密碼</label>
                                <div class="input-wrapper">
                                    <input type="password" id="confirmPassword" required data-i18n-placeholder="reset_password.confirm_password_placeholder" placeholder="再次輸入新密碼" minlength="6" autocomplete="new-password">
                                    <button class="toggle-password" type="button" onclick="togglePwd('confirmPassword', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div id="resetError" class="vlogin-alert vlogin-alert-danger"></div>

                            <button type="submit" class="vlogin-btn vlogin-btn-primary vlogin-submit-btn" id="resetBtn">
                                <span class="btn-text" data-i18n="reset_password.submit_btn">重設密碼</span>
                                <span class="btn-loading d-none">
                                    <span class="spinner-border spinner-border-sm me-2" role="status"></span><span data-i18n="reset_password.processing">處理中...</span>
                                </span>
                            </button>
                        </form>
                    </div>

                    <!-- Success Section -->
                    <div id="resetSuccessSection" style="display: none; text-align: center; padding: 20px 0;">
                        <div style="width:56px;height:56px;background:#f0fdf4;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
                            <i class="bi bi-check-lg" style="font-size:28px;color:#16a34a;"></i>
                        </div>
                        <h3 style="font-size:20px;font-weight:500;color:#202124;margin-bottom:8px;" data-i18n="reset_password.success_title">密碼已重設</h3>
                        <p style="font-size:14px;color:#5f6368;margin-bottom:24px;" data-i18n="reset_password.success_message">您的密碼已成功重設，請使用新密碼登入。</p>
                        <a href="/login" class="vlogin-btn vlogin-btn-primary" data-i18n="reset_password.go_to_login">前往登入</a>
                    </div>

                    <!-- Invalid Token Section -->
                    <div id="invalidTokenSection" style="display: none; text-align: center; padding: 20px 0;">
                        <div style="width:56px;height:56px;background:#fef2f2;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
                            <i class="bi bi-exclamation-triangle" style="font-size:28px;color:#dc2626;"></i>
                        </div>
                        <h3 style="font-size:20px;font-weight:500;color:#202124;margin-bottom:8px;" data-i18n="reset_password.invalid_title">連結無效</h3>
                        <p style="font-size:14px;color:#5f6368;margin-bottom:24px;" data-i18n="reset_password.invalid_message">此密碼重設連結無效或已過期，請重新申請。</p>
                        <a href="/login" class="vlogin-btn vlogin-btn-primary" data-i18n="reset_password.back_to_login">返回登入</a>
                    </div>

                </div>
            </div>
        </div>

        <div class="vlogin-page-footer">
            <div class="vlogin-footer-left">
                <a href="/login" style="color: #5f6368; text-decoration: none; font-size: 13px;">
                    <i class="bi bi-arrow-left me-1"></i><span data-i18n="reset_password.back_to_login">返回登入</span>
                </a>
            </div>
            <div class="vlogin-footer-right">
                <span>&copy; 2025 V-sys Limited</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script>
        // Helper: get translated string with fallback
        function _t(key, fallback) {
            if (typeof I18n !== 'undefined' && I18n.t) {
                return I18n.t(key, fallback);
            }
            return fallback || key;
        }

        // ===== Language switcher =====
        (function initLangSwitcher() {
            var langLabels = { 'zh': '繁體中文', 'zh-CN': '简体中文', 'en': 'English' };
            var currentLang = (typeof I18n !== 'undefined' && I18n.currentLang) ? I18n.currentLang : 'zh';
            var labelEl = document.getElementById('currentLangLabel');
            if (labelEl) labelEl.textContent = langLabels[currentLang] || '繁體中文';

            document.querySelectorAll('.lang-option').forEach(function(item) {
                if (item.getAttribute('data-lang') === currentLang) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
                item.addEventListener('click', function() {
                    var lang = this.getAttribute('data-lang');
                    if (typeof I18n !== 'undefined') {
                        I18n.setLang(lang);
                    }
                });
            });
        })();

        // Update page title
        if (typeof I18n !== 'undefined') {
            I18n.whenReady(function() {
                var titleEl = document.getElementById('pageTitle');
                if (titleEl) titleEl.textContent = _t('reset_password.page_title', '重設密碼 - vShip');
            });
        }

        // Toggle password visibility
        function togglePwd(inputId, btn) {
            var input = document.getElementById(inputId);
            var icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        // Get token from URL
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');

        if (!token) {
            document.getElementById('resetFormSection').style.display = 'none';
            document.getElementById('invalidTokenSection').style.display = 'block';
        }

        // Alert helpers
        function showError(msg) {
            var el = document.getElementById('resetError');
            el.textContent = msg;
            el.classList.add('show');
        }
        function clearError() {
            var el = document.getElementById('resetError');
            el.textContent = '';
            el.classList.remove('show');
        }

        // Button loading state
        function setBtnLoading(btn, loading) {
            var textEl = btn.querySelector('.btn-text');
            var loadEl = btn.querySelector('.btn-loading');
            if (textEl) textEl.classList.toggle('d-none', loading);
            if (loadEl) loadEl.classList.toggle('d-none', !loading);
            btn.disabled = loading;
        }

        // Form submit
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('resetBtn');
            var newPwd = document.getElementById('newPassword').value;
            var confirmPwd = document.getElementById('confirmPassword').value;

            clearError();

            if (newPwd.length < 6) {
                showError(_t('reset_password.password_too_short', '密碼至少需要 6 位字元'));
                return;
            }
            if (newPwd !== confirmPwd) {
                showError(_t('reset_password.password_mismatch', '兩次輸入的密碼不一致'));
                return;
            }

            setBtnLoading(btn, true);

            try {
                var resp = await fetch('/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPwd }),
                });
                var data = await resp.json();
                if (resp.ok) {
                    document.getElementById('resetFormSection').style.display = 'none';
                    document.getElementById('resetSuccessSection').style.display = 'block';
                } else {
                    if (data.error && (data.error.includes('無效') || data.error.includes('過期') || data.error.includes('expired') || data.error.includes('invalid'))) {
                        document.getElementById('resetFormSection').style.display = 'none';
                        document.getElementById('invalidTokenSection').style.display = 'block';
                    } else {
                        showError(data.error || _t('reset_password.reset_failed', '重設失敗，請稍後再試'));
                    }
                }
            } catch (err) {
                showError(_t('reset_password.network_error', '網路錯誤，請稍後再試'));
            } finally {
                setBtnLoading(btn, false);
            }
        });
    </script>
</body>
</html>
{{end}}
