{{define "pages/package_forecast"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.package_forecast.title">預報包裹</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.package_forecast.search_tracking" placeholder="搜尋運單號...">
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.package_scan_in.tracking_no">運單號</th>
                    <th data-i18n="common.user">用戶</th>
                    <th data-i18n="pages.packages.category">分類</th>
                    <th data-i18n="pages.package_forecast.forecast_time">預報時間</th>
                    <th data-i18n="common.actions">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

let currentPage = 1; const limit = 20;
const API_PATH = '/packages';

function loadData(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    const params = buildQueryParams({ search, status: 'forecast' });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    return `<tr>
        <td><strong>${item.tracking_no || '--'}</strong></td>
        <td>${item.user_name || item.user_id || '--'}</td>
        <td>${item.category_name || '--'}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>
            <div class="action-buttons">
                <a href="/packages/${item.id}/edit" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                <button class="btn btn-sm btn-outline-success" onclick="receivePackage('${item.id}')" title="${_t('pages.package_scan_in.confirm_receive', '確認入庫')}"><i class="fas fa-box"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deletePackage('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        </td>
    </tr>`;
}
async function receivePackage(id) {
    try {
        await apiRequest('PUT', API_PATH + '/' + id + '/receive');
        showToast(_t('pages.package_scan_in.receive_success', '入庫成功'));
        loadData(currentPage);
    } catch (e) {}
}
async function deletePackage(id) { if (!confirmDelete()) return; try { await apiRequest('DELETE', API_PATH + '/' + id); showToast(_t('common.delete_success', '刪除成功')); loadData(currentPage); } catch (e) {} }
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
