{{define "pages/orders_pending_inspect"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.order_sub.pending_inspect">待查驗訂單</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadOrders(1)">
            <i class="fas fa-sync-alt me-1"></i><span data-i18n="common.refresh">刷新</span>
        </button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.orders.search_order" placeholder="搜尋訂單編號...">
        </div>
        <select class="form-select" id="filterPayment" style="max-width:150px;">
            <option value="" data-i18n="pages.order_sub.payment_status">付款狀態</option>
            <option value="paid" data-i18n="pages.order_sub.paid">已付款</option>
            <option value="unpaid" data-i18n="pages.order_sub.unpaid_status">未付款</option>
        </select>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.orders.order_number">訂單編號</th>
                    <th data-i18n="pages.orders.user">用戶</th>
                    <th data-i18n="pages.orders.route">線路</th>
                    <th data-i18n="pages.orders.package_count">包裹數</th>
                    <th data-i18n="pages.orders.total_weight">總重量</th>
                    <th data-i18n="pages.orders.amount">金額</th>
                    <th data-i18n="pages.order_sub.payment">付款</th>
                    <th data-i18n="common.created_at">建立時間</th>
                    <th data-i18n="common.operations">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="9" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<script>
let currentPage = 1;
const limit = 20;

function loadOrders(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    const payment = document.getElementById('filterPayment').value;
    const params = buildQueryParams({ search, status: 'pending_inspect', payment_status: payment });
    loadTableData('/orders', 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    return `<tr>
        <td><a href="/orders/${item.id}">${item.order_no || '--'}</a></td>
        <td>${item.user_name || '--'}</td>
        <td>${item.route_name || '--'}</td>
        <td>${item.package_count || 0}</td>
        <td>${item.total_weight || 0} kg</td>
        <td>${formatMoney(item.total_amount)}</td>
        <td>${getStatusBadge(item.payment_status)}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>
            <div class="action-buttons">
                <a href="/orders/${item.id}" class="btn btn-sm btn-outline-primary" title="${typeof I18n !== 'undefined' ? I18n.t('common.view') : '查看'}"><i class="fas fa-eye"></i></a>
                <button class="btn btn-sm btn-outline-success" onclick="inspectOrder('${item.id}')" title="${typeof I18n !== 'undefined' ? I18n.t('pages.order_sub.pass_inspect') : '通過查驗'}"><i class="fas fa-check"></i></button>
            </div>
        </td>
    </tr>`;
}

async function inspectOrder(id) {
    if (!confirm(typeof I18n !== 'undefined' ? I18n.t('pages.order_sub.confirm_pass_inspect') : '確定通過查驗嗎？')) return;
    try {
        await apiRequest('PUT', '/orders/' + id + '/pack');
        showToast((typeof I18n !== 'undefined' ? I18n.t('pages.order_sub.inspect_passed') : '查驗通過'), 'success');
        loadOrders(currentPage);
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => loadOrders(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadOrders(1)));
document.getElementById('filterPayment').addEventListener('change', () => loadOrders(1));
</script>
{{end}}
