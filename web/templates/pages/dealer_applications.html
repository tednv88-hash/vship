{{define "pages/dealer_applications"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.dealer_applications.title">分銷商申請</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.dealer_applications.search_applicant" placeholder="搜尋用戶/手機號..."></div>
        <ul class="nav nav-tabs card-header-tabs" id="statusTabs">
            <li class="nav-item"><a class="nav-link active" href="#" data-status="" onclick="switchTab(this)" data-i18n="pages.dealer_applications.all">全部</a></li>
            <li class="nav-item"><a class="nav-link" href="#" data-status="pending" onclick="switchTab(this)" data-i18n="pages.dealer_applications.pending_review">待審核</a></li>
            <li class="nav-item"><a class="nav-link" href="#" data-status="approved" onclick="switchTab(this)" data-i18n="pages.dealer_applications.approved">已同意</a></li>
            <li class="nav-item"><a class="nav-link" href="#" data-status="rejected" onclick="switchTab(this)" data-i18n="pages.dealer_applications.rejected">已拒絕</a></li>
        </ul>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="common.user">用戶</th>
                <th data-i18n="pages.dealer_applications.real_name">真實姓名</th>
                <th data-i18n="pages.dealer_applications.phone">手機號</th>
                <th data-i18n="pages.dealer_applications.apply_reason">申請原因</th>
                <th data-i18n="common.status">狀態</th>
                <th data-i18n="common.time">時間</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Reject Modal -->
<div class="modal fade" id="rejectModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" data-i18n="pages.dealer_applications.reject_application">拒絕申請</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
        <div class="mb-3">
            <label class="form-label" data-i18n="pages.dealer_applications.reject_reason">拒絕原因 <span class="text-danger">*</span></label>
            <textarea class="form-control" id="auditRemark" rows="3" data-i18n-placeholder="pages.dealer_applications.enter_reject_reason" placeholder="請輸入拒絕原因"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-danger" onclick="doReject()" data-i18n="pages.dealer_applications.confirm_reject_btn">確定拒絕</button>
    </div>
</div></div></div>

<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
let currentPage = 1; const limit = 20; const API_PATH = '/dealer/applications';
let currentStatus = ''; let rejectingId = null;

function switchTab(el) {
    document.querySelectorAll('#statusTabs .nav-link').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
    currentStatus = el.dataset.status;
    loadData(1);
}

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, status: currentStatus });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    let actions = '--';
    if (item.status === 'pending') {
        actions = `<div class="action-buttons">
            <button class="btn btn-sm btn-outline-success" onclick="approveItem('${item.id}')"><i class="fas fa-check"></i> <span data-i18n="pages.dealer_applications.approve">${_t('pages.dealer_applications.approve', '同意')}</span></button>
            <button class="btn btn-sm btn-outline-danger" onclick="openRejectModal('${item.id}')"><i class="fas fa-times"></i> <span data-i18n="pages.dealer_applications.reject">${_t('pages.dealer_applications.reject', '拒絕')}</span></button>
        </div>`;
    }
    return `<tr>
        <td>${item.user_name || '--'}</td>
        <td>${item.real_name || '--'}</td>
        <td>${item.phone || '--'}</td>
        <td>${item.reason || '--'}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>${actions}</td>
    </tr>`;
}

async function approveItem(id) {
    if (!confirm(_t('pages.dealer_applications.confirm_approve', '確定要同意此申請嗎？'))) return;
    try {
        await apiRequest('PUT', API_PATH + '/' + id + '/approve');
        showToast(_t('pages.dealer_applications.approved_msg', '已同意'), 'success');
        loadData(currentPage);
    } catch(e) {}
}

function openRejectModal(id) {
    rejectingId = id;
    document.getElementById('auditRemark').value = '';
    openModal('rejectModal');
}

async function doReject() {
    const audit_remark = document.getElementById('auditRemark').value;
    if (!audit_remark) { showToast(_t('pages.dealer_applications.enter_reason_required', '請輸入拒絕原因'), 'error'); return; }
    try {
        await apiRequest('PUT', API_PATH + '/' + rejectingId + '/reject', { audit_remark });
        showToast(_t('pages.dealer_applications.rejected_msg', '已拒絕'), 'success');
        closeModal('rejectModal');
        loadData(currentPage);
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
