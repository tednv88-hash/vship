{{define "pages/goods_categories"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.goods_categories.title">商品分類</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.goods_categories.search_category" placeholder="搜尋分類名稱..."></div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.goods_categories.category_name">分類名稱</th><th data-i18n="common.image">圖片</th><th data-i18n="common.sort">排序</th><th data-i18n="common.status">狀態</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.goods_categories.add_category">新增分類</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="itemForm"><input type="hidden" name="id">
        <div class="mb-3"><label class="form-label" data-i18n="pages.goods_categories.category_name">分類名稱 <span class="text-danger">*</span></label><input type="text" class="form-control" name="name" required></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.goods_categories.image_url">圖片 URL</label><input type="text" class="form-control" name="image_url" placeholder="https://..."></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.goods_categories.parent_category">上級分類</label><select class="form-select" name="parent_id" id="parentSelect"><option value="" data-i18n="pages.goods_categories.no_parent">無（頂級分類）</option></select></div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label" data-i18n="common.sort">排序</label><input type="number" class="form-control" name="sort_order" data-type="number" value="0"></div>
            <div class="col-md-6 mb-3"><label class="form-label" data-i18n="common.status">狀態</label><select class="form-select" name="status"><option value="active" data-i18n="common.status_active">啟用</option><option value="inactive" data-i18n="common.status_inactive">停用</option></select></div>
        </div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
</div></div></div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/goods-categories';
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    const img = item.image_url ? `<img src="${item.image_url}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;">` : '<span class="text-muted">--</span>';
    return `<tr><td>${item.name||'--'}</td><td>${img}</td><td>${item.sort_order||0}</td><td>${getStatusBadge(item.status)}</td><td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
}
function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.goods_categories.add_category', '新增分類');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.goods_categories.add_category');
    resetForm('itemForm'); openModal('formModal');
}
async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.goods_categories.edit_category', '編輯分類');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.goods_categories.edit_category');
    try { const res = await apiRequest('GET', API_PATH+'/'+id); populateForm('itemForm', res.data||res); openModal('formModal'); } catch(e){}
}
async function saveItem() {
    const data = getFormData('itemForm');
    try {
        if(editingId){await apiRequest('PUT',API_PATH+'/'+editingId,data);showToast(_t('common.update_success','更新成功'));}
        else{await apiRequest('POST',API_PATH,data);showToast(_t('common.create_success','建立成功'));}
        closeModal('formModal'); loadData(currentPage);
    } catch(e){}
}
async function deleteItem(id) {
    if(!confirmDelete(_t('pages.goods_categories.confirm_delete','確定要刪除此分類嗎？')))return;
    try{await apiRequest('DELETE',API_PATH+'/'+id);showToast(_t('common.delete_success','刪除成功'));loadData(currentPage);}catch(e){}
}
async function loadParentCategories() {
    try {
        const res = await apiRequest('GET', API_PATH+'?limit=100');
        const items = res.data || res || [];
        const sel = document.getElementById('parentSelect');
        items.forEach(c => sel.insertAdjacentHTML('beforeend', `<option value="${c.id}">${c.name}</option>`));
    } catch(e){}
}
document.addEventListener('DOMContentLoaded', () => { loadParentCategories(); loadData(1); });
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
