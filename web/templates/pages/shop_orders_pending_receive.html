{{define "pages/shop_orders_pending_receive"}}
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0" data-i18n="pages.shop_orders.pending_receive_orders">待收貨訂單</h5>
    </div>
    <ul class="nav nav-tabs px-3" id="statusTabs">
        <li class="nav-item"><a class="nav-link" href="/shop-orders" data-i18n="pages.shop_orders.all">全部</a></li>
        <li class="nav-item"><a class="nav-link" href="/shop-orders/pending-pay" data-i18n="pages.shop_orders.pending_pay">待付款</a></li>
        <li class="nav-item"><a class="nav-link" href="/shop-orders/pending-ship" data-i18n="pages.shop_orders.pending_ship">待發貨</a></li>
        <li class="nav-item"><a class="nav-link active" href="/shop-orders/pending-receive" data-i18n="pages.shop_orders.pending_receive_orders">待收貨</a></li>
        <li class="nav-item"><a class="nav-link" href="/shop-orders/completed" data-i18n="pages.shop_orders.completed">已完成</a></li>
    </ul>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.shop_orders.search_order" placeholder="搜尋訂單號..."></div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.shop_orders.order_no">訂單號</th><th data-i18n="common.user">用戶</th><th data-i18n="pages.shop_orders.product_count">商品數量</th><th data-i18n="pages.shop_orders.total_amount">總金額</th><th data-i18n="pages.shop_orders.express_company">快遞公司</th><th data-i18n="pages.shop_orders.express_no">快遞單號</th><th data-i18n="pages.shop_orders.shipped_time">發貨時間</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="8" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<script>
let currentPage = 1; const limit = 20; const API_PATH = '/shop-orders';
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, status: 'shipped' });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    const actions = `<a href="/shop-orders/${item.id}" class="btn btn-sm btn-outline-primary"><i class="fas fa-eye"></i></a>`;
    return `<tr><td><a href="/shop-orders/${item.id}">${item.order_no||'--'}</a></td><td>${item.user_name||'--'}</td><td>${item.item_count||0}</td><td>${formatMoney(item.total_amount)}</td><td>${item.express_company||'--'}</td><td>${item.express_no||'--'}</td><td>${formatDate(item.shipped_at)}</td><td><div class="action-buttons">${actions}</div></td></tr>`;
}
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
