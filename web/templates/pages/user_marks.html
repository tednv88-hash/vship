{{define "pages/user_marks"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.user_marks.title">標記列表</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.user_marks.search_placeholder" placeholder="搜尋標記名稱/用戶..."></div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="common.user">用戶</th>
                <th data-i18n="pages.user_marks.mark_name">標記名稱</th>
                <th data-i18n="common.remark">備註</th>
                <th data-i18n="common.created_at">時間</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.user_marks.add_mark">新增標記</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="itemForm"><input type="hidden" name="id">
        <div class="mb-3"><label class="form-label" data-i18n="pages.package_unclaimed.user_id_label">用戶 ID</label><input type="text" class="form-control" name="user_id"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.user_marks.mark_name">標記名稱 <span class="text-danger">*</span></label><input type="text" class="form-control" name="mark_name" required></div>
        <div class="mb-3"><label class="form-label" data-i18n="common.remark">備註</label><input type="text" class="form-control" name="remark"></div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
</div></div></div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/user-marks';
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    return `<tr><td>${item.user_name||item.user_id||'--'}</td><td>${item.mark_name||'--'}</td><td>${item.remark||'--'}</td><td>${formatDate(item.created_at)}</td><td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
}
function openCreateModal() { editingId = null; document.getElementById('modalTitle').textContent = _t('pages.user_marks.add_mark', '新增標記'); resetForm('itemForm'); openModal('formModal'); }
async function editItem(id) { editingId = id; document.getElementById('modalTitle').textContent = _t('pages.user_marks.edit_mark', '編輯標記'); try { const res = await apiRequest('GET', API_PATH+'/'+id); populateForm('itemForm', res.data||res); openModal('formModal'); } catch(e){} }
async function saveItem() { const data = getFormData('itemForm'); try { if(editingId){await apiRequest('PUT',API_PATH+'/'+editingId,data);showToast(_t('common.update_success','更新成功'));}else{await apiRequest('POST',API_PATH,data);showToast(_t('common.create_success','建立成功'));} closeModal('formModal'); loadData(currentPage); } catch(e){} }
async function deleteItem(id) { if(!confirmDelete())return; try{await apiRequest('DELETE',API_PATH+'/'+id);showToast(_t('common.delete_success','刪除成功'));loadData(currentPage);}catch(e){} }
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
