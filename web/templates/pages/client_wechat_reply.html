{{define "pages/client_wechat_reply"}}
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0" data-i18n="pages.client_wechat_reply.title">自動回覆</h5>
    </div>
    <div class="card-body">
        <form id="settingForm">
            <div class="mb-4">
                <label class="form-label fw-bold" data-i18n="pages.client_wechat_reply.follow_reply">被關注回覆</label>
                <textarea class="form-control" name="subscribe_reply" rows="5" data-i18n-placeholder="pages.client_wechat_reply.follow_reply_desc" placeholder="用戶關注公眾號後自動回覆的內容&#10;&#10;可使用模板變量：&#10;{code} - 用戶綁定碼"></textarea>
                <small class="text-muted" data-i18n="pages.client_wechat_reply.follow_reply_detail">當用戶關注公眾號時自動回覆的消息內容。支持模板變量 {code} 表示用戶綁定碼。</small>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold" data-i18n="pages.client_wechat_reply.message_reply">收到消息回覆</label>
                <textarea class="form-control" name="message_reply" rows="5" data-i18n-placeholder="pages.client_wechat_reply.message_reply_desc" placeholder="收到用戶消息時自動回覆的內容"></textarea>
                <small class="text-muted" data-i18n="pages.client_wechat_reply.message_reply_detail">當用戶發送消息給公眾號時自動回覆的內容。</small>
            </div>
            <button type="button" class="btn btn-primary" onclick="saveSetting()">
                <i class="fas fa-save me-1"></i><span data-i18n="common.save_settings">儲存設置</span>
            </button>
        </form>
    </div>
</div>

<script>
const API_PATH = '/app-settings';
const SETTING_TYPE = 'wechat_reply';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

async function loadSetting() {
    try {
        const res = await apiRequest('GET', API_PATH + '?setting_type=' + SETTING_TYPE);
        const data = res.data || res;
        if (data && typeof data === 'object') {
            populateForm('settingForm', data);
        }
    } catch (e) {}
}

async function saveSetting() {
    const data = getFormData('settingForm');
    data.setting_type = SETTING_TYPE;
    try {
        await apiRequest('POST', API_PATH, data);
        showToast(_t('common.save_success', '儲存成功'), 'success');
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => loadSetting());
</script>
{{end}}
