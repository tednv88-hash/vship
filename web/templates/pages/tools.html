{{define "pages/tools"}}
<div class="row g-3">
    <div class="col-md-6 col-xl-4">
        <a href="/tools/guide" class="text-decoration-none">
            <div class="card hover-shadow">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-card-icon bg-primary-light"><i class="fas fa-book text-primary"></i></div>
                    <div><h6 class="mb-1 text-dark" data-i18n="pages.tools_guide.title">使用指南</h6><small class="text-muted" data-i18n="pages.tools_guide.subtitle">系統操作說明與教程</small></div>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-6 col-xl-4">
        <a href="/tools/api" class="text-decoration-none">
            <div class="card hover-shadow">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-card-icon bg-info-light"><i class="fas fa-code text-info"></i></div>
                    <div><h6 class="mb-1 text-dark" data-i18n="pages.tools_api.title">API 接口</h6><small class="text-muted" data-i18n="pages.tools_api.subtitle">查看系統 API 文檔</small></div>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-6 col-xl-4">
        <a href="/tools/update-log" class="text-decoration-none">
            <div class="card hover-shadow">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-card-icon bg-success-light"><i class="fas fa-history text-success"></i></div>
                    <div><h6 class="mb-1 text-dark" data-i18n="pages.tools_update_log.title">更新日誌</h6><small class="text-muted" data-i18n="pages.tools_update_log.subtitle">系統版本更新記錄</small></div>
                </div>
            </div>
        </a>
    </div>
</div>
{{end}}
