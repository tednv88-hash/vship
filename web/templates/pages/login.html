{{define "pages/login"}}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">登入 - vShip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/login.css" rel="stylesheet">
    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Language switcher styles */
        .vlogin-lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
        }
        .vlogin-lang-switcher .dropdown-toggle {
            background: rgba(255,255,255,0.9);
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            color: #5f6368;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .vlogin-lang-switcher .dropdown-toggle:hover {
            background: #fff;
            border-color: #bdc1c6;
        }
        .vlogin-lang-switcher .dropdown-menu {
            min-width: 160px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            border: 1px solid #dadce0;
        }
        .vlogin-lang-switcher .dropdown-item {
            font-size: 13px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .vlogin-lang-switcher .dropdown-item .lang-check {
            display: none;
            color: #05ce78;
        }
        .vlogin-lang-switcher .dropdown-item.active .lang-check {
            display: inline;
        }
    </style>
</head>
<body class="login-page">

    <!-- Language Switcher -->
    <div class="vlogin-lang-switcher dropdown">
        <button class="dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-globe2"></i>
            <span id="currentLangLabel">繁體中文</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item lang-option" href="javascript:void(0)" data-lang="zh">繁體中文 <i class="bi bi-check-lg lang-check"></i></a></li>
            <li><a class="dropdown-item lang-option" href="javascript:void(0)" data-lang="zh-CN">简体中文 <i class="bi bi-check-lg lang-check"></i></a></li>
            <li><a class="dropdown-item lang-option" href="javascript:void(0)" data-lang="en">English <i class="bi bi-check-lg lang-check"></i></a></li>
        </ul>
    </div>

    <div class="vlogin-wrapper">
        <!-- ===== Main Content (Card) ===== -->
        <div class="vlogin-main">
            <div class="vlogin-card">
                <!-- Card Left: Logo + Title -->
                <div class="vlogin-card-left">
                    <div class="vlogin-logo">
                        <i class="bi bi-truck"></i>
                    </div>

                    <!-- ===== LOGIN HEADER ===== -->
                    <div id="loginHeader">
                        <h1 class="vlogin-title" data-i18n="login.title">登入</h1>
                        <p class="vlogin-subtitle" data-i18n="login.subtitle">使用您的 vShip 帳號</p>
                        <p class="vlogin-brand-desc" data-i18n="login.brand_desc">跨境集運管理系統</p>
                    </div>

                    <!-- ===== REGISTER HEADER ===== -->
                    <div id="registerHeader" style="display: none;">
                        <h1 class="vlogin-title" data-i18n="login.register_title">建立帳號</h1>
                        <p class="vlogin-subtitle" data-i18n="login.register_subtitle">註冊 vShip 帳號</p>
                        <p class="vlogin-brand-desc" data-i18n="login.register_brand_desc">免費開始使用跨境集運管理</p>
                    </div>

                    <!-- ===== FORGOT PASSWORD HEADER ===== -->
                    <div id="forgotPasswordHeader" style="display: none;">
                        <h1 class="vlogin-title" data-i18n="login.forgot_title">重設密碼</h1>
                        <p class="vlogin-subtitle" data-i18n="login.forgot_subtitle">輸入電子郵件以重設密碼</p>
                    </div>
                </div>

                <!-- Card Right: Form Area -->
                <div class="vlogin-card-right">

                    <!-- ===== LOGIN FORM ===== -->
                    <form id="loginForm">
                        <div class="vlogin-form-group">
                            <label for="loginEmail" data-i18n="login.email">電子郵件</label>
                            <input type="email" id="loginEmail" name="email" required data-i18n-placeholder="login.email_placeholder" placeholder="請輸入電子郵件" autocomplete="email">
                        </div>

                        <div class="vlogin-form-group">
                            <label for="loginPassword" data-i18n="login.password">密碼</label>
                            <div class="input-wrapper">
                                <input type="password" id="loginPassword" name="password" required data-i18n-placeholder="login.password_placeholder" placeholder="請輸入密碼" autocomplete="current-password">
                                <button class="toggle-password" type="button" onclick="togglePwd('loginPassword', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div style="margin-bottom: 8px;">
                            <a href="javascript:void(0)" class="vlogin-link" id="showForgotPassword" data-i18n="login.forgot_password">忘記密碼？</a>
                        </div>

                        <div id="loginError" class="vlogin-alert vlogin-alert-danger"></div>

                        <button type="submit" class="vlogin-btn vlogin-btn-primary vlogin-submit-btn" id="loginBtn">
                            <span class="btn-text" data-i18n="login.login_btn">登入</span>
                            <span class="btn-loading d-none">
                                <span class="spinner-border spinner-border-sm me-2" role="status"></span><span data-i18n="login.logging_in">登入中...</span>
                            </span>
                        </button>

                        <div class="vlogin-divider">
                            <span data-i18n="login.or">或</span>
                        </div>

                        <!-- Google Login -->
                        <button type="button" class="vlogin-btn vlogin-btn-social" id="btnGoogleLogin">
                            <span class="btn-icon">
                                <svg width="18" height="18" viewBox="0 0 18 18">
                                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                                    <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.348 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
                                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
                                </svg>
                            </span>
                            <span data-i18n="login.google_login">使用 Google 登入</span>
                        </button>

                        <div class="vlogin-actions">
                            <div class="vlogin-signup-link">
                                <a href="javascript:void(0)" id="showRegister" data-i18n="login.create_account">建立帳號</a>
                            </div>
                        </div>
                    </form>

                    <!-- ===== REGISTER FORM ===== -->
                    <div id="registerForm" style="display: none;">
                        <form id="registerFormData">
                            <div class="vlogin-form-group">
                                <label for="regName"><span data-i18n="login.name">姓名</span> <span class="text-danger">*</span></label>
                                <input type="text" id="regName" name="name" required data-i18n-placeholder="login.name_placeholder" placeholder="請輸入姓名" autocomplete="name">
                            </div>

                            <div class="vlogin-form-group">
                                <label for="regEmail"><span data-i18n="login.email">電子郵件</span> <span class="text-danger">*</span></label>
                                <input type="email" id="regEmail" name="email" required data-i18n-placeholder="login.email_placeholder" placeholder="請輸入電子郵件" autocomplete="email">
                            </div>

                            <div class="vlogin-form-group">
                                <label for="regPhone" data-i18n="login.phone">電話號碼</label>
                                <div class="vlogin-phone-row">
                                    <select id="regPhoneCode">
                                        <option value="+852">+852 HK</option>
                                        <option value="+886">+886 TW</option>
                                        <option value="+86">+86 CN</option>
                                        <option value="+81">+81 JP</option>
                                        <option value="+82">+82 KR</option>
                                        <option value="+1">+1 US</option>
                                        <option value="+44">+44 UK</option>
                                        <option value="+61">+61 AU</option>
                                        <option value="+65">+65 SG</option>
                                        <option value="+60">+60 MY</option>
                                    </select>
                                    <input type="tel" id="regPhone" name="phone" data-i18n-placeholder="login.phone_placeholder" placeholder="電話號碼" autocomplete="tel">
                                </div>
                            </div>

                            <div class="vlogin-form-group">
                                <label for="regPassword"><span data-i18n="login.password">密碼</span> <span class="text-danger">*</span></label>
                                <div class="input-wrapper">
                                    <input type="password" id="regPassword" name="password" required data-i18n-placeholder="login.password_min_length" placeholder="至少 6 位字元" minlength="6" autocomplete="new-password">
                                    <button class="toggle-password" type="button" onclick="togglePwd('regPassword', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="vlogin-form-group">
                                <label for="regPasswordConfirm"><span data-i18n="login.confirm_password">確認密碼</span> <span class="text-danger">*</span></label>
                                <div class="input-wrapper">
                                    <input type="password" id="regPasswordConfirm" data-i18n-placeholder="login.confirm_password_placeholder" placeholder="再次輸入密碼" required minlength="6" autocomplete="new-password">
                                    <button class="toggle-password" type="button" onclick="togglePwd('regPasswordConfirm', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div id="registerError" class="vlogin-alert vlogin-alert-danger"></div>
                            <div id="registerSuccess" class="vlogin-alert vlogin-alert-success"></div>

                            <button type="submit" class="vlogin-btn vlogin-btn-primary vlogin-submit-btn" id="registerBtn">
                                <span class="btn-text" data-i18n="login.register_btn">註冊</span>
                                <span class="btn-loading d-none">
                                    <span class="spinner-border spinner-border-sm me-2" role="status"></span><span data-i18n="login.registering">註冊中...</span>
                                </span>
                            </button>

                            <div class="vlogin-divider">
                                <span data-i18n="login.or">或</span>
                            </div>

                            <button type="button" class="vlogin-btn vlogin-btn-social" id="btnGoogleRegister">
                                <span class="btn-icon">
                                    <svg width="18" height="18" viewBox="0 0 18 18">
                                        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                                        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                                        <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.348 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
                                        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
                                    </svg>
                                </span>
                                <span data-i18n="login.google_register">使用 Google 註冊</span>
                            </button>

                            <div class="vlogin-actions">
                                <div class="vlogin-signup-link">
                                    <a href="javascript:void(0)" id="showLogin" data-i18n="login.has_account">已有帳號？返回登入</a>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- ===== FORGOT PASSWORD FORM ===== -->
                    <div id="forgotPasswordForm" style="display: none;">
                        <form id="forgotPasswordFormData">
                            <div class="vlogin-form-group">
                                <label for="forgotEmail" data-i18n="login.email">電子郵件</label>
                                <input type="email" id="forgotEmail" name="email" data-i18n-placeholder="login.forgot_email_placeholder" placeholder="請輸入您的電子郵件" required autocomplete="email">
                                <div class="vlogin-help-text" data-i18n="login.forgot_help">我們會發送密碼重設連結到您的郵箱</div>
                            </div>

                            <div id="forgotError" class="vlogin-alert vlogin-alert-danger"></div>
                            <div id="forgotSuccess" class="vlogin-alert vlogin-alert-success"></div>

                            <div class="vlogin-actions" style="justify-content: space-between;">
                                <a href="javascript:void(0)" class="vlogin-link" id="showLoginFromForgot" data-i18n="login.back_to_login">返回登入</a>
                                <button type="submit" class="vlogin-btn vlogin-btn-primary" id="forgotBtn">
                                    <span class="btn-text" data-i18n="login.send_reset_link">發送重設連結</span>
                                    <span class="btn-loading d-none">
                                        <span class="spinner-border spinner-border-sm me-2" role="status"></span><span data-i18n="login.sending">發送中...</span>
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>

        <!-- ===== Page Footer (outside card) ===== -->
        <div class="vlogin-page-footer">
            <div class="vlogin-footer-left">
                <a href="/" style="color: #5f6368; text-decoration: none; font-size: 13px;">
                    <i class="bi bi-arrow-left me-1"></i><span data-i18n="login.back_to_home">返回首頁</span>
                </a>
            </div>
            <div class="vlogin-footer-right">
                <span>&copy; 2025 V-sys Limited</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script>
        // Helper: get translated string with fallback
        function _t(key, fallback) {
            if (typeof I18n !== 'undefined' && I18n.t) {
                return I18n.t(key, fallback);
            }
            return fallback || key;
        }

        // ===== Language switcher =====
        (function initLangSwitcher() {
            var langLabels = { 'zh': '繁體中文', 'zh-CN': '简体中文', 'en': 'English' };
            var currentLang = (typeof I18n !== 'undefined' && I18n.currentLang) ? I18n.currentLang : 'zh';
            var labelEl = document.getElementById('currentLangLabel');
            if (labelEl) labelEl.textContent = langLabels[currentLang] || '繁體中文';

            // Mark active language
            document.querySelectorAll('.lang-option').forEach(function(item) {
                if (item.getAttribute('data-lang') === currentLang) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
                item.addEventListener('click', function() {
                    var lang = this.getAttribute('data-lang');
                    if (typeof I18n !== 'undefined') {
                        I18n.setLang(lang);
                    }
                });
            });
        })();

        // ===== Toggle password visibility =====
        function togglePwd(inputId, btn) {
            var input = document.getElementById(inputId);
            var icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        // ===== Section Switching =====
        function showSection(section) {
            var loginForm = document.getElementById('loginForm');
            var registerForm = document.getElementById('registerForm');
            var forgotForm = document.getElementById('forgotPasswordForm');
            var loginHeader = document.getElementById('loginHeader');
            var registerHeader = document.getElementById('registerHeader');
            var forgotHeader = document.getElementById('forgotPasswordHeader');
            var title = document.getElementById('pageTitle');

            // Hide all
            loginForm.style.display = 'none';
            registerForm.style.display = 'none';
            forgotForm.style.display = 'none';
            loginHeader.style.display = 'none';
            registerHeader.style.display = 'none';
            forgotHeader.style.display = 'none';

            // Clear alerts
            clearAlerts();

            if (section === 'register') {
                registerForm.style.display = 'block';
                registerHeader.style.display = 'block';
                title.textContent = _t('login.page_title_register', '註冊 - vShip');
                history.replaceState(null, '', '/login?reg=1');
            } else if (section === 'forgot') {
                forgotForm.style.display = 'block';
                forgotHeader.style.display = 'block';
                title.textContent = _t('login.page_title_forgot', '忘記密碼 - vShip');
            } else {
                loginForm.style.display = 'block';
                loginHeader.style.display = 'block';
                title.textContent = _t('login.page_title_login', '登入 - vShip');
                history.replaceState(null, '', '/login');
            }
        }

        function clearAlerts() {
            ['loginError', 'registerError', 'registerSuccess', 'forgotError', 'forgotSuccess'].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) { el.classList.remove('show'); el.textContent = ''; }
            });
        }

        function showAlert(id, msg) {
            var el = document.getElementById(id);
            if (el) { el.textContent = msg; el.classList.add('show'); }
        }

        // Button loading state
        function setBtnLoading(btn, loading) {
            var textEl = btn.querySelector('.btn-text');
            var loadEl = btn.querySelector('.btn-loading');
            if (textEl) textEl.classList.toggle('d-none', loading);
            if (loadEl) loadEl.classList.toggle('d-none', !loading);
            btn.disabled = loading;
        }

        // ===== Click handlers for section switching =====
        document.getElementById('showRegister').addEventListener('click', function() { showSection('register'); });
        document.getElementById('showLogin').addEventListener('click', function() { showSection('login'); });
        document.getElementById('showForgotPassword').addEventListener('click', function() { showSection('forgot'); });
        document.getElementById('showLoginFromForgot').addEventListener('click', function() { showSection('login'); });

        // Check URL params on load
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('reg') === '1') {
                showSection('register');
            }
        })();

        // ===== Login Form Submit =====
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('loginBtn');
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;

            clearAlerts();
            setBtnLoading(btn, true);

            try {
                var resp = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password }),
                });
                var data = await resp.json();
                if (resp.ok && data.token) {
                    // Store auth data in localStorage (matching vWork pattern)
                    localStorage.setItem('auth_token', data.token);
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                        if (data.user.tenant_id) {
                            localStorage.setItem('tenant_id', data.user.tenant_id);
                        }
                    }
                    window.location.href = '/dashboard';
                } else {
                    showAlert('loginError', data.error || data.message || _t('login.login_failed_check', '登入失敗，請檢查帳號密碼'));
                }
            } catch (err) {
                showAlert('loginError', _t('login.network_error', '網路錯誤，請稍後再試'));
            } finally {
                setBtnLoading(btn, false);
            }
        });

        // ===== Register Form Submit =====
        document.getElementById('registerFormData').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('registerBtn');

            var name = document.getElementById('regName').value.trim();
            var email = document.getElementById('regEmail').value.trim();
            var phoneCode = document.getElementById('regPhoneCode').value;
            var phoneNum = document.getElementById('regPhone').value.trim();
            var password = document.getElementById('regPassword').value;
            var passwordConfirm = document.getElementById('regPasswordConfirm').value;

            clearAlerts();

            if (!name || !email || !password) {
                showAlert('registerError', _t('login.fill_required', '請填寫所有必填欄位'));
                return;
            }
            if (password.length < 6) {
                showAlert('registerError', _t('login.password_too_short', '密碼至少需要 6 位字元'));
                return;
            }
            if (password !== passwordConfirm) {
                showAlert('registerError', _t('login.password_mismatch', '兩次輸入的密碼不一致'));
                return;
            }

            var phone = phoneNum ? (phoneCode + phoneNum) : '';
            setBtnLoading(btn, true);

            try {
                var resp = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, email: email, phone: phone, password: password }),
                });
                var data = await resp.json();
                if (resp.ok) {
                    showAlert('registerSuccess', _t('login.register_success_login', '註冊成功！正在為您登入...'));
                    // Auto-login after register
                    var loginResp = await fetch('/api/v1/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, password: password }),
                    });
                    var loginData = await loginResp.json();
                    if (loginResp.ok && loginData.token) {
                        // Store auth data in localStorage (matching vWork pattern)
                        localStorage.setItem('auth_token', loginData.token);
                        if (loginData.user) {
                            localStorage.setItem('user', JSON.stringify(loginData.user));
                            if (loginData.user.tenant_id) {
                                localStorage.setItem('tenant_id', loginData.user.tenant_id);
                            }
                        }
                        setTimeout(function() { window.location.href = '/dashboard'; }, 800);
                    } else {
                        showAlert('registerSuccess', _t('login.register_success_manual', '註冊成功！請返回登入頁面登入。'));
                        setTimeout(function() { showSection('login'); }, 2000);
                    }
                } else {
                    showAlert('registerError', data.error || data.message || _t('login.register_failed', '註冊失敗，請稍後再試'));
                }
            } catch (err) {
                showAlert('registerError', _t('login.network_error', '網路錯誤，請稍後再試'));
            } finally {
                setBtnLoading(btn, false);
            }
        });

        // ===== Forgot Password Form Submit =====
        document.getElementById('forgotPasswordFormData').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('forgotBtn');
            var email = document.getElementById('forgotEmail').value.trim();

            clearAlerts();

            if (!email) {
                showAlert('forgotError', _t('login.forgot_email_required', '請輸入您的電子郵件'));
                return;
            }

            setBtnLoading(btn, true);

            try {
                var resp = await fetch('/api/v1/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email }),
                });
                var data = await resp.json();
                if (resp.ok) {
                    showAlert('forgotSuccess', data.message || _t('login.forgot_success', '如果該電子郵件已註冊，我們已發送密碼重設連結'));
                    document.getElementById('forgotEmail').value = '';
                    setTimeout(function() { showSection('login'); }, 3000);
                } else {
                    showAlert('forgotError', data.error || _t('login.forgot_failed', '發送失敗，請稍後再試'));
                }
            } catch (err) {
                showAlert('forgotError', _t('login.network_error', '網路錯誤，請稍後再試'));
            } finally {
                setBtnLoading(btn, false);
            }
        });

        // ===== Google OAuth =====
        var googleClientId = '';

        // Fetch Google OAuth config from backend
        async function initGoogleOAuth() {
            try {
                var resp = await fetch('/api/v1/auth/google/config');
                var data = await resp.json();
                if (data.enabled && data.client_id) {
                    googleClientId = data.client_id;
                    // Show Google buttons (they are already visible by default)
                } else {
                    // Hide Google buttons if not configured
                    hideGoogleButtons();
                }
            } catch (err) {
                hideGoogleButtons();
            }
        }

        function hideGoogleButtons() {
            var btns = document.querySelectorAll('#btnGoogleLogin, #btnGoogleRegister');
            btns.forEach(function(btn) { btn.style.display = 'none'; });
            // Also hide dividers if no social login
            var dividers = document.querySelectorAll('.vlogin-divider');
            dividers.forEach(function(d) { d.style.display = 'none'; });
        }

        async function handleGoogleLogin() {
            if (!googleClientId) {
                showAlert('loginError', _t('login.google_login_disabled', 'Google 登入目前未啟用'));
                return;
            }

            try {
                // Use Google Identity Services
                google.accounts.id.initialize({
                    client_id: googleClientId,
                    callback: async function(response) {
                        try {
                            var resp = await fetch('/api/v1/auth/google', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ token: response.credential }),
                            });
                            var data = await resp.json();
                            if (resp.ok && data.token) {
                                // Store auth data in localStorage (matching vWork pattern)
                                localStorage.setItem('auth_token', data.token);
                                if (data.user) {
                                    localStorage.setItem('user', JSON.stringify(data.user));
                                    if (data.user.tenant_id) {
                                        localStorage.setItem('tenant_id', data.user.tenant_id);
                                    }
                                }
                                if (data.requires_setup) {
                                    window.location.href = '/setup-tenant';
                                } else {
                                    window.location.href = '/dashboard';
                                }
                            } else {
                                showAlert('loginError', data.error || _t('login.google_login_failed', 'Google 登入失敗'));
                            }
                        } catch (err) {
                            showAlert('loginError', _t('login.network_error', '網路錯誤，請稍後再試'));
                        }
                    },
                    auto_select: false,
                    cancel_on_tap_outside: true,
                });
                google.accounts.id.prompt();
            } catch (err) {
                showAlert('loginError', _t('login.google_init_failed', 'Google 登入初始化失敗，請稍後再試'));
            }
        }

        // Bind Google buttons
        document.getElementById('btnGoogleLogin').addEventListener('click', handleGoogleLogin);
        document.getElementById('btnGoogleRegister').addEventListener('click', handleGoogleLogin);

        // Init Google OAuth on load
        initGoogleOAuth();
    </script>
</body>
</html>
{{end}}
