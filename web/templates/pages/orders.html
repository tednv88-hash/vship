{{define "pages/orders"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.orders.management">集運訂單</h5>
        <a href="/orders/create" class="btn btn-primary btn-sm">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </a>
    </div>
    <div class="filter-bar">
        <div class="search-input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.orders.search_order" placeholder="搜尋訂單編號...">
        </div>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="common.filter_all_status">全部狀態</option>
            <option value="pending" data-i18n="common.status_pending">待處理</option>
            <option value="processing" data-i18n="common.status_processing">處理中</option>
            <option value="shipping" data-i18n="common.status_shipping">運送中</option>
            <option value="delivered" data-i18n="common.status_delivered">已送達</option>
            <option value="completed" data-i18n="common.status_completed">已完成</option>
            <option value="cancelled" data-i18n="common.status_cancelled">已取消</option>
        </select>
        <select class="form-select" id="filterPayment" style="max-width:150px;">
            <option value="" data-i18n="pages.order_sub.payment_status">付款狀態</option>
            <option value="paid" data-i18n="common.status_paid">已付款</option>
            <option value="unpaid" data-i18n="common.status_unpaid">未付款</option>
        </select>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadOrders(1)">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th data-i18n="pages.orders.order_number">訂單編號</th>
                    <th data-i18n="common.user">用戶</th>
                    <th data-i18n="pages.orders.route">線路</th>
                    <th data-i18n="pages.orders.package_count">包裹數</th>
                    <th data-i18n="pages.orders.total_weight">總重量</th>
                    <th data-i18n="pages.orders.amount">金額</th>
                    <th data-i18n="pages.order_sub.payment">付款</th>
                    <th data-i18n="common.status">狀態</th>
                    <th data-i18n="common.created_at">建立時間</th>
                    <th data-i18n="common.operations">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="10" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<script>
let currentPage = 1;
const limit = 20;

function loadOrders(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    const status = document.getElementById('filterStatus').value;
    const payment = document.getElementById('filterPayment').value;
    const params = buildQueryParams({ search, status, payment_status: payment });

    loadTableData('/orders', 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    return `<tr>
        <td><a href="/orders/${item.id}">${item.order_no || '--'}</a></td>
        <td>${item.user_name || '--'}</td>
        <td>${item.route_name || '--'}</td>
        <td>${item.package_count || 0}</td>
        <td>${item.total_weight || 0} kg</td>
        <td>${formatMoney(item.total_amount)}</td>
        <td>${getStatusBadge(item.payment_status)}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>
            <div class="action-buttons">
                <a href="/orders/${item.id}" class="btn btn-sm btn-outline-primary"><i class="fas fa-eye"></i></a>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteOrder('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        </td>
    </tr>`;
}

async function deleteOrder(id) {
    if (!confirmDelete(typeof I18n !== 'undefined' ? I18n.t('pages.orders.confirm_delete') : '確定要刪除此訂單嗎？')) return;
    try {
        await apiRequest('DELETE', '/orders/' + id);
        showToast(typeof I18n !== 'undefined' ? I18n.t('common.delete_success') : '刪除成功', 'success');
        loadOrders(currentPage);
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => loadOrders(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadOrders(1)));
document.getElementById('filterStatus').addEventListener('change', () => loadOrders(1));
document.getElementById('filterPayment').addEventListener('change', () => loadOrders(1));
</script>
{{end}}
