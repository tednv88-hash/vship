{{define "pages/points_logs"}}
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0" data-i18n="pages.points_logs.title">積分明細</h5>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.points_logs.search_user" placeholder="搜尋用戶名..."></div>
        <select class="form-select form-select-sm" id="typeFilter" style="width:auto;" onchange="loadData(1)">
            <option value="" data-i18n="pages.points_logs.all_types">全部類型</option>
            <option value="earn" data-i18n="pages.points_logs.earn">獲取</option>
            <option value="spend" data-i18n="pages.points_logs.consume">消費</option>
            <option value="adjust" data-i18n="pages.points_logs.adjust">調整</option>
        </select>
        <input type="text" class="form-control form-control-sm" id="userIdFilter" style="width:150px;" data-i18n-placeholder="pages.points_logs.user_id_placeholder" placeholder="用戶 ID" onchange="loadData(1)">
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="common.user">用戶</th><th data-i18n="pages.points_logs.change_value">變動值</th><th data-i18n="pages.points_logs.balance">餘額</th><th data-i18n="pages.points_logs.type">類型</th><th data-i18n="pages.points_logs.description">描述</th><th data-i18n="common.time">時間</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
let currentPage = 1; const limit = 20; const API_PATH = '/points/logs';
const typeKeys = { earn:'pages.points_logs.earn', spend:'pages.points_logs.consume', adjust:'pages.points_logs.adjust' };
const typeDefaults = { earn:'獲取', spend:'消費', adjust:'調整' };
const typeColors = { earn:'text-success', spend:'text-danger', adjust:'text-warning' };
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, type: document.getElementById('typeFilter').value, user_id: document.getElementById('userIdFilter').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    const type = typeKeys[item.type] ? _t(typeKeys[item.type], typeDefaults[item.type]) : (item.type || '--');
    const color = typeColors[item.type] || '';
    const changeVal = item.change > 0 ? `<span class="text-success">+${item.change}</span>` : `<span class="text-danger">${item.change}</span>`;
    return `<tr><td>${item.user_name||'--'}</td><td>${changeVal}</td><td>${item.balance||0}</td><td><span class="${color}">${type}</span></td><td>${item.description||'--'}</td><td>${formatDate(item.created_at)}</td></tr>`;
}
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
