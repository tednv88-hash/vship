{{define "pages/barcode_settings"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.barcode_settings.title">條碼設置</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.barcode_settings.barcode_type">條碼類型</th>
                <th data-i18n="pages.barcode_settings.prefix">前綴</th>
                <th data-i18n="pages.barcode_settings.length">長度</th>
                <th data-i18n="pages.barcode_settings.current_seq">當前序號</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.barcode_settings.add_barcode">新增條碼設置</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
        <form id="itemForm">
            <input type="hidden" name="id" id="itemId">
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.barcode_settings.barcode_type">條碼類型 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="barcode_type" required data-i18n-placeholder="pages.barcode_settings.barcode_type_example" placeholder="例如：package, order, batch">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.barcode_settings.prefix">前綴 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="prefix" required data-i18n-placeholder="pages.barcode_settings.prefix_example" placeholder="例如：PK, OD, BT">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.barcode_settings.length">長度 <span class="text-danger">*</span></label>
                <input type="number" class="form-control" name="length" required min="1" data-i18n-placeholder="pages.barcode_settings.seq_digits" placeholder="序號位數">
            </div>
        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
    </div>
</div></div></div>

<script>
let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/barcode-settings';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function loadData(page) {
    currentPage = page;
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit);
}

function renderRow(item) {
    return `<tr>
        <td>${item.barcode_type || '--'}</td>
        <td><code>${item.prefix || '--'}</code></td>
        <td>${item.length ?? '--'}</td>
        <td>${item.current_seq ?? '--'}</td>
        <td><div class="action-buttons">
            <button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
        </div></td>
    </tr>`;
}

function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.barcode_settings.add_barcode', '新增條碼設置');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.barcode_settings.add_barcode');
    resetForm('itemForm');
    openModal('formModal');
}

async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.barcode_settings.edit_barcode', '編輯條碼設置');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.barcode_settings.edit_barcode');
    try {
        const res = await apiRequest('GET', API_PATH + '/' + id);
        populateForm('itemForm', res.data || res);
        openModal('formModal');
    } catch(e) {}
}

async function saveItem() {
    const data = getFormData('itemForm');
    try {
        if (editingId) {
            await apiRequest('PUT', API_PATH + '/' + editingId, data);
            showToast(_t('common.update_success', '更新成功'), 'success');
        } else {
            await apiRequest('POST', API_PATH, data);
            showToast(_t('common.create_success', '建立成功'), 'success');
        }
        closeModal('formModal');
        loadData(currentPage);
    } catch(e) {}
}

async function deleteItem(id) {
    if (!confirmDelete(_t('pages.barcode_settings.confirm_delete', '確定要刪除此條碼設置嗎？'))) return;
    try {
        await apiRequest('DELETE', API_PATH + '/' + id);
        showToast(_t('common.delete_success', '刪除成功'), 'success');
        loadData(currentPage);
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => loadData(1));
</script>
{{end}}
