{{define "pages/storage_settings"}}
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0" data-i18n="pages.storage_settings.title">存儲設置</h5>
    </div>
    <div class="card-body">
        <form id="settingsForm">
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.storage_settings.storage_type">存儲方式</label>
                <select class="form-select" name="storage_type" id="storageType" onchange="toggleStorageFields()">
                    <option value="local" data-i18n="pages.storage_settings.local_storage">本地存儲</option>
                    <option value="oss" data-i18n="pages.storage_settings.aliyun_oss">阿里雲 OSS</option>
                    <option value="cos" data-i18n="pages.storage_settings.tencent_cos">騰訊雲 COS</option>
                </select>
            </div>

            <div id="cloudFields" class="d-none">
                <div class="mb-3">
                    <label class="form-label">Bucket</label>
                    <input type="text" class="form-control" name="bucket">
                </div>
                <div class="mb-3">
                    <label class="form-label">Region</label>
                    <input type="text" class="form-control" name="region" placeholder="例: ap-southeast-1">
                </div>
                <div class="mb-3">
                    <label class="form-label">Access Key</label>
                    <input type="text" class="form-control" name="access_key">
                </div>
                <div class="mb-3">
                    <label class="form-label">Secret Key</label>
                    <input type="password" class="form-control" name="secret_key">
                </div>
                <div class="mb-3">
                    <label class="form-label" data-i18n="pages.storage_settings.custom_domain">自定義域名（CDN）</label>
                    <input type="url" class="form-control" name="cdn_domain" placeholder="https://">
                </div>
            </div>

            <button type="button" class="btn btn-primary" onclick="saveSettings()" data-i18n="common.save_settings">儲存設置</button>
        </form>
    </div>
</div>

<script>
const SETTING_KEY = 'storage_setting';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function toggleStorageFields() {
    const type = document.getElementById('storageType').value;
    document.getElementById('cloudFields').classList.toggle('d-none', type === 'local');
}

async function loadSettings() {
    try {
        const res = await apiRequest('GET', '/settings/' + SETTING_KEY);
        const data = res.data || res;
        if (data && data.value) {
            const val = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
            populateForm('settingsForm', val);
            toggleStorageFields();
        }
    } catch (e) {}
}

async function saveSettings() {
    const data = getFormData('settingsForm');
    try {
        await apiRequest('PUT', '/settings/' + SETTING_KEY, { key: SETTING_KEY, value: JSON.stringify(data) });
        showToast(_t('common.save_success', '儲存成功'));
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => loadSettings());
</script>
{{end}}
