{{define "pages/goods_reviews"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.goods_reviews.title">商品評價</h5>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.goods_reviews.search_placeholder" placeholder="搜尋商品名稱/用戶..."></div>
        <select class="form-select form-select-sm" id="statusFilter" style="width:auto;" onchange="loadData(1)">
            <option value="" data-i18n="common.filter_all_status">全部狀態</option>
            <option value="approved" data-i18n="common.status_reviewed">已審核</option>
            <option value="pending" data-i18n="common.status_pending">待審核</option>
            <option value="rejected" data-i18n="common.status_rejected">已拒絕</option>
        </select>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.goods_reviews.product">商品</th><th data-i18n="pages.goods_reviews.user">用戶</th><th data-i18n="pages.goods_reviews.rating">評分</th><th data-i18n="pages.goods_reviews.content">內容</th><th data-i18n="pages.goods_reviews.reply">回覆</th><th data-i18n="common.status">狀態</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="replyModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" data-i18n="pages.goods_reviews.reply_review">回覆評價</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="replyForm"><input type="hidden" name="id" id="replyId">
        <div class="mb-3"><label class="form-label" data-i18n="pages.goods_reviews.reply_content">回覆內容</label><textarea class="form-control" name="reply" rows="4" data-i18n-placeholder="pages.goods_reviews.reply_placeholder" placeholder="請輸入回覆內容..."></textarea></div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveReply()" data-i18n="pages.goods_reviews.submit_reply">送出回覆</button></div>
</div></div></div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
let currentPage = 1; const limit = 20; const API_PATH = '/goods-reviews';
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, status: document.getElementById('statusFilter').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderStars(rating) {
    let s = '';
    for (let i = 1; i <= 5; i++) s += `<i class="fas fa-star${i <= rating ? ' text-warning' : ' text-muted'}"></i>`;
    return s;
}
function renderRow(item) {
    const reply = item.reply ? `<small class="text-muted">${item.reply.substring(0,30)}${item.reply.length>30?'...':''}</small>` : '<span class="text-muted">--</span>';
    const content = item.content ? `${item.content.substring(0,40)}${item.content.length>40?'...':''}` : '--';
    return `<tr><td>${item.goods_name||'--'}</td><td>${item.user_name||'--'}</td><td>${renderStars(item.rating||0)}</td><td>${content}</td><td>${reply}</td><td>${getStatusBadge(item.status)}</td><td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="openReplyModal('${item.id}','${(item.reply||'').replace(/'/g,"\\'").replace(/\n/g,' ')}')"><i class="fas fa-reply"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
}
function openReplyModal(id, existingReply) {
    document.getElementById('replyId').value = id;
    document.querySelector('#replyForm textarea[name="reply"]').value = existingReply || '';
    openModal('replyModal');
}
async function saveReply() {
    const id = document.getElementById('replyId').value;
    const reply = document.querySelector('#replyForm textarea[name="reply"]').value;
    try { await apiRequest('PUT', API_PATH+'/'+id, { reply }); showToast(_t('pages.goods_reviews.reply_success', '回覆成功')); closeModal('replyModal'); loadData(currentPage); } catch(e){}
}
async function deleteItem(id) { if(!confirmDelete())return; try{await apiRequest('DELETE',API_PATH+'/'+id);showToast(_t('common.delete_success','刪除成功'));loadData(currentPage);}catch(e){} }
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
