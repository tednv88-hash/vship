{{define "pages/order_reviews"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.order_sub.reviews">訂單評價</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.order_sub.search_order_user_alt" placeholder="搜尋訂單號/用戶..."></div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.order_reviews.order">訂單</th>
                <th data-i18n="pages.orders.user">用戶</th>
                <th data-i18n="pages.order_reviews.rating">評分</th>
                <th data-i18n="pages.order_reviews.content">內容</th>
                <th data-i18n="pages.order_reviews.reply">回覆</th>
                <th data-i18n="pages.order_reviews.time">時間</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Reply Modal -->
<div class="modal fade" id="replyModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" data-i18n="pages.order_sub.reply_review">回覆評價</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
        <div class="mb-3">
            <label class="form-label" data-i18n="pages.order_sub.reply_content">回覆內容 <span class="text-danger">*</span></label>
            <textarea class="form-control" id="replyText" rows="4" data-i18n-placeholder="pages.order_sub.enter_reply" placeholder="請輸入回覆內容"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-primary" onclick="submitReply()" data-i18n="pages.order_sub.submit_reply">送出回覆</button>
    </div>
</div></div></div>

<script>
let currentPage = 1; const limit = 20; const API_PATH = '/order-reviews'; let replyingId = null;

const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderStars(rating) {
    const n = parseInt(rating) || 0;
    return '<span class="text-warning">' + '★'.repeat(n) + '</span>' + '<span class="text-muted">' + '★'.repeat(5 - n) + '</span>';
}

function renderRow(item) {
    const replyBtn = item.reply
        ? `<button class="btn btn-sm btn-outline-secondary" onclick="openReplyModal('${item.id}', true)"><i class="fas fa-eye"></i> <span>${_t('common.view', '查看')}</span></button>`
        : `<button class="btn btn-sm btn-outline-primary" onclick="openReplyModal('${item.id}', false)"><i class="fas fa-reply"></i> <span>${_t('pages.order_reviews.reply_btn', '回覆')}</span></button>`;
    return `<tr>
        <td>${item.order_no || '--'}</td>
        <td>${item.user_name || '--'}</td>
        <td>${renderStars(item.rating)}</td>
        <td>${item.content || '--'}</td>
        <td>${item.reply || '<span class="text-muted">' + _t('pages.order_sub.no_reply', '未回覆') + '</span>'}</td>
        <td>${formatDate(item.created_at)}</td>
        <td><div class="action-buttons">${replyBtn}</div></td>
    </tr>`;
}

function openReplyModal(id, hasReply) {
    replyingId = id;
    document.getElementById('replyText').value = '';
    if (hasReply) {
        apiRequest('GET', API_PATH + '/' + id).then(res => {
            const item = res.data || res;
            document.getElementById('replyText').value = item.reply || '';
        }).catch(() => {});
    }
    openModal('replyModal');
}

async function submitReply() {
    const reply = document.getElementById('replyText').value;
    if (!reply) { showToast(_t('pages.order_sub.enter_reply', '請輸入回覆內容'), 'error'); return; }
    try {
        await apiRequest('PUT', API_PATH + '/' + replyingId + '/reply', { reply });
        showToast(_t('pages.order_sub.reply_success', '回覆成功'), 'success');
        closeModal('replyModal');
        loadData(currentPage);
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
