{{define "pages/warehouse_applications"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.warehouse_applications.title">入駐申請</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.warehouse_applications.search_applicant" placeholder="搜尋申請人/倉庫名..."></div>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="common.filter_all_status">全部狀態</option>
            <option value="pending" data-i18n="pages.warehouse_applications.status_pending">待審核</option>
            <option value="approved" data-i18n="pages.warehouse_applications.status_approved">已通過</option>
            <option value="rejected" data-i18n="pages.warehouse_applications.status_rejected">已拒絕</option>
        </select>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.warehouse_applications.applicant">申請人</th>
                <th data-i18n="pages.warehouse_clerks.phone">電話</th>
                <th data-i18n="pages.warehouse_applications.warehouse_name">倉庫名稱</th>
                <th data-i18n="pages.warehouses.address">地址</th>
                <th data-i18n="common.status">狀態</th>
                <th data-i18n="common.time">時間</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Reject Modal -->
<div class="modal fade" id="rejectModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" data-i18n="pages.warehouse_applications.reject_application">拒絕申請</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
        <div class="mb-3">
            <label class="form-label" data-i18n="pages.warehouse_applications.reject_reason">拒絕原因</label>
            <textarea class="form-control" id="auditRemark" rows="3" data-i18n-placeholder="pages.warehouse_applications.reject_reason_placeholder" placeholder="請輸入拒絕原因"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-danger" onclick="doReject()" data-i18n="pages.warehouse_applications.confirm_reject">確定拒絕</button>
    </div>
</div></div></div>

<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
let currentPage = 1; const limit = 20; const API_PATH = '/warehouse-applications'; let rejectingId = null;

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, status: document.getElementById('filterStatus').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    let actions = '--';
    if (item.status === 'pending') {
        actions = `<div class="action-buttons">
            <button class="btn btn-sm btn-outline-success" onclick="approveItem('${item.id}')"><i class="fas fa-check"></i> ${_t('pages.warehouse_applications.approve', '通過')}</button>
            <button class="btn btn-sm btn-outline-danger" onclick="openRejectModal('${item.id}')"><i class="fas fa-times"></i> ${_t('pages.warehouse_applications.reject', '拒絕')}</button>
        </div>`;
    }
    return `<tr>
        <td>${item.applicant_name || '--'}</td>
        <td>${item.phone || '--'}</td>
        <td>${item.warehouse_name || '--'}</td>
        <td>${item.address || '--'}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>${actions}</td>
    </tr>`;
}

async function approveItem(id) {
    if (!confirm(_t('pages.warehouse_applications.confirm_approve', '確定要通過此入駐申請嗎？'))) return;
    try {
        await apiRequest('PUT', API_PATH + '/' + id + '/approve');
        showToast(_t('pages.warehouse_applications.approved', '已通過'), 'success');
        loadData(currentPage);
    } catch(e) {}
}

function openRejectModal(id) {
    rejectingId = id;
    document.getElementById('auditRemark').value = '';
    openModal('rejectModal');
}

async function doReject() {
    const audit_remark = document.getElementById('auditRemark').value;
    try {
        await apiRequest('PUT', API_PATH + '/' + rejectingId + '/reject', { audit_remark });
        showToast(_t('pages.warehouse_applications.rejected', '已拒絕'), 'success');
        closeModal('rejectModal');
        loadData(currentPage);
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
document.getElementById('filterStatus').addEventListener('change', () => loadData(1));
</script>
{{end}}
