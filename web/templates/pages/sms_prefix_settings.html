{{define "pages/sms_prefix_settings"}}
<div class="card mb-4">
    <div class="card-header">
        <h5 class="card-title mb-0" data-i18n="pages.sms_prefix_settings.title">短信前綴設置</h5>
    </div>
    <div class="card-body">
        <form id="smsPrefixForm">
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.sms_prefix_settings.sms_prefix">短信簽名前綴</label>
                <input type="text" class="form-control" name="sms_prefix" data-i18n-placeholder="pages.sms_prefix_settings.enter_prefix" placeholder="請輸入短信簽名前綴">
            </div>
            <button type="button" class="btn btn-primary" onclick="saveSmsPrefix()"><i class="fas fa-save me-1"></i><span data-i18n="common.save">保存</span></button>
        </form>
    </div>
</div>
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.sms_prefix_settings.common_templates">常用軌跡模板</h5>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()"><i class="fas fa-plus me-1"></i><span data-i18n="pages.sms_prefix_settings.add_template">新增模板</span></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.sms_prefix_settings.track_name">軌跡名稱</th><th data-i18n="pages.sms_prefix_settings.track_description">軌跡描述</th><th data-i18n="pages.sms_prefix_settings.sort_order">排序</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="4" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="templateModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="templateModalTitle" data-i18n="pages.sms_prefix_settings.add_track_template">新增軌跡模板</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="templateForm"><input type="hidden" name="id" id="templateId">
        <div class="mb-3"><label class="form-label" data-i18n="pages.sms_prefix_settings.track_name">軌跡名稱 <span class="text-danger">*</span></label><input type="text" class="form-control" name="name" required data-i18n-placeholder="pages.sms_prefix_settings.enter_track_name" placeholder="請輸入軌跡名稱"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.sms_prefix_settings.track_description">軌跡描述</label><textarea class="form-control" name="description" rows="3" data-i18n-placeholder="pages.sms_prefix_settings.enter_track_description" placeholder="請輸入軌跡描述"></textarea></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.sms_prefix_settings.sort_order">排序</label><input type="number" class="form-control" name="sort" value="0" min="0"></div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveTemplate()" data-i18n="common.save">保存</button></div>
</div></div></div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
let currentPage = 1; const limit = 20;
const SMS_API = '/settings/sms-prefix';
const TEMPLATE_API = '/tracking-templates';
let editingId = null;
async function loadSmsPrefix() {
    try { const data = await apiRequest('GET', SMS_API); if (data) populateForm('smsPrefixForm', data); } catch(e){}
}
async function saveSmsPrefix() {
    const data = getFormData('smsPrefixForm');
    try { await apiRequest('PUT', SMS_API, data); showToast(_t('pages.sms_prefix_settings.save_success', '保存成功')); } catch(e){}
}
function loadData(page) {
    currentPage = page;
    loadTableData(TEMPLATE_API, 'tableBody', renderRow, 'pagination', page, limit);
}
function renderRow(item) {
    const actions = `<button class="btn btn-sm btn-outline-primary" onclick="openEditModal('${item.id}')"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="deleteTemplate('${item.id}')"><i class="fas fa-trash"></i></button>`;
    return `<tr><td>${item.name||'--'}</td><td>${item.description||'--'}</td><td>${item.sort||0}</td><td><div class="action-buttons">${actions}</div></td></tr>`;
}
function openAddModal() {
    editingId = null;
    document.getElementById('templateModalTitle').textContent = _t('pages.sms_prefix_settings.add_track_template', '新增軌跡模板');
    document.getElementById('templateModalTitle').setAttribute('data-i18n', 'pages.sms_prefix_settings.add_track_template');
    resetForm('templateForm'); openModal('templateModal');
}
async function openEditModal(id) {
    editingId = id;
    document.getElementById('templateModalTitle').textContent = _t('pages.sms_prefix_settings.edit_template', '編輯軌跡模板');
    document.getElementById('templateModalTitle').setAttribute('data-i18n', 'pages.sms_prefix_settings.edit_template');
    try { const data = await apiRequest('GET', TEMPLATE_API+'/'+id); resetForm('templateForm'); populateForm('templateForm', data); document.getElementById('templateId').value = id; openModal('templateModal'); } catch(e){}
}
async function saveTemplate() {
    const data = getFormData('templateForm');
    try {
        if (editingId) { await apiRequest('PUT', TEMPLATE_API+'/'+editingId, data); } else { await apiRequest('POST', TEMPLATE_API, data); }
        showToast(_t('pages.sms_prefix_settings.save_success', '保存成功'));
        closeModal('templateModal'); loadData(currentPage);
    } catch(e){}
}
async function deleteTemplate(id) {
    if (!await confirmDelete()) return;
    try { await apiRequest('DELETE', TEMPLATE_API+'/'+id); showToast(_t('pages.sms_prefix_settings.delete_success', '刪除成功')); loadData(currentPage); } catch(e){}
}
document.addEventListener('DOMContentLoaded', () => { loadSmsPrefix(); loadData(1); });
</script>
{{end}}
