{{define "pages/coupon_receives"}}
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0" data-i18n="pages.coupon_receives.title">優惠券領取記錄</h5>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.coupon_receives.search_user" placeholder="搜尋優惠券/用戶..."></div>
        <select class="form-select form-select-sm" id="statusFilter" style="width:auto;" onchange="loadData(1)">
            <option value="" data-i18n="common.filter_all_status">全部狀態</option>
            <option value="unused" data-i18n="pages.coupon_receives.unused">未使用</option>
            <option value="used" data-i18n="pages.coupon_receives.used">已使用</option>
            <option value="expired" data-i18n="pages.coupon_receives.expired">已過期</option>
        </select>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.coupons.coupon_name">優惠券</th><th data-i18n="common.user">用戶</th><th data-i18n="common.status">狀態</th><th data-i18n="pages.coupon_receives.use_time">使用時間</th><th data-i18n="pages.coupon_receives.claim_time">領取時間</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<script>
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
let currentPage = 1; const limit = 20; const API_PATH = '/coupon-receives';
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, status: document.getElementById('statusFilter').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    const statusMap = { unused: _t('pages.coupon_receives.unused','未使用'), used: _t('pages.coupon_receives.used','已使用'), expired: _t('pages.coupon_receives.expired','已過期') };
    const statusColors = { unused:'bg-info', used:'bg-success', expired:'bg-secondary' };
    const status = statusMap[item.status] || item.status || '--';
    const color = statusColors[item.status] || 'bg-secondary';
    return `<tr><td>${item.coupon_name||item.coupon_code||'--'}</td><td>${item.user_name||'--'}</td><td><span class="badge ${color}">${status}</span></td><td>${item.used_at ? formatDate(item.used_at) : '--'}</td><td>${formatDate(item.created_at)}</td></tr>`;
}
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
