{{define "pages/blind_box_wall"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.blind_box.share_wall">盲盒分享牆</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i>
            <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.blind_box.search_user_placeholder" placeholder="搜尋用戶...">
        </div>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="pages.blind_box.all">全部</option>
            <option value="visible" data-i18n="pages.blind_box.visible">已展示</option>
            <option value="hidden" data-i18n="pages.blind_box.hidden">已隱藏</option>
        </select>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.blind_box.user">用戶</th>
                <th data-i18n="pages.blind_box.blind_box_activity">盲盒活動</th>
                <th data-i18n="pages.blind_box.prize">獎品</th>
                <th data-i18n="pages.blind_box.share_content">分享內容</th>
                <th data-i18n="pages.blind_box.likes">點讚數</th>
                <th data-i18n="common.status">狀態</th>
                <th data-i18n="common.time">時間</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="8" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<script>
let currentPage = 1; const limit = 20;
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
function loadData(page) { currentPage = page; const search = document.getElementById('searchInput').value;
    const status = document.getElementById('filterStatus').value;
    const params = buildQueryParams({ search, visibility: status });
    loadTableData('/blind-box/draws', 'tableBody', renderRow, 'pagination', page, limit, params); }
function renderRow(item) { return `<tr><td>${item.user_name || '--'}</td><td>${item.activity_name || '--'}</td><td>${item.prize_name || '--'}</td>
    <td>${item.share_content || '--'}</td><td>${item.like_count || 0}</td>
    <td>${item.visibility === 'hidden' ? '<span class="badge bg-secondary">' + _t('pages.blind_box.hidden', '已隱藏') + '</span>' : '<span class="badge bg-success">' + _t('pages.blind_box.showing', '展示中') + '</span>'}</td>
    <td>${formatDate(item.created_at)}</td>
    <td><div class="action-buttons"><button class="btn btn-sm btn-outline-${item.visibility === 'hidden' ? 'success' : 'warning'}" onclick="toggleVisibility('${item.id}', '${item.visibility}')" title="${item.visibility === 'hidden' ? _t('pages.blind_box.toggle_show', '展示') : _t('pages.blind_box.toggle_hide', '隱藏')}">
    <i class="fas fa-${item.visibility === 'hidden' ? 'eye' : 'eye-slash'}"></i></button>
    <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`; }
async function toggleVisibility(id, current) { try { await apiRequest('PUT', '/blind-box/draws/' + id, { visibility: current === 'hidden' ? 'visible' : 'hidden' });
    showToast(_t('pages.blind_box.updated', '已更新'), 'success'); loadData(currentPage); } catch(e) {} }
async function deleteItem(id) { if (!confirmDelete(_t('pages.blind_box.confirm_delete_msg', '確定刪除嗎？'))) return;
    try { await apiRequest('DELETE', '/blind-box/draws/' + id); showToast(_t('common.delete_success', '刪除成功'), 'success'); loadData(currentPage); } catch(e) {} }
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
document.getElementById('filterStatus').addEventListener('change', () => loadData(1));
</script>
{{end}}
