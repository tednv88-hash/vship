{{define "pages/bank_accounts"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.bank_accounts.title">銀行設置</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.bank_accounts.search_placeholder" placeholder="搜尋銀行名稱/帳號..."></div>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="common.all_status">全部狀態</option>
            <option value="active" data-i18n="common.enable">啟用</option>
            <option value="inactive" data-i18n="common.disable">停用</option>
        </select>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.bank_accounts.bank_name">銀行名稱</th>
                <th data-i18n="pages.bank_accounts.account_name">帳戶名</th>
                <th data-i18n="pages.bank_accounts.account_no">帳號</th>
                <th data-i18n="pages.bank_accounts.branch">分行</th>
                <th data-i18n="pages.bank_accounts.currency">幣種</th>
                <th data-i18n="pages.bank_accounts.is_default">是否默認</th>
                <th data-i18n="common.status">狀態</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="8" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.bank_accounts.add_account">新增銀行帳戶</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
        <form id="itemForm">
            <input type="hidden" name="id" id="itemId">
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.bank_accounts.bank_name">銀行名稱 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="bank_name" required>
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.bank_accounts.account_name">帳戶名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="account_name" required>
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.bank_accounts.account_no">帳號 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="account_no" required>
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.bank_accounts.branch">分行</label>
                <input type="text" class="form-control" name="branch">
            </div>
            <div class="mb-3">
                <label class="form-label">SWIFT Code</label>
                <input type="text" class="form-control" name="swift_code">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" data-i18n="pages.bank_accounts.currency">幣種</label>
                    <input type="text" class="form-control" name="currency" data-i18n-placeholder="pages.bank_accounts.currency_example" placeholder="例如：USD, CNY, TWD">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" data-i18n="pages.bank_accounts.is_default">是否默認</label>
                    <select class="form-select" name="is_default">
                        <option value="false" data-i18n="common.no">否</option>
                        <option value="true" data-i18n="common.yes">是</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="common.status">狀態</label>
                <select class="form-select" name="status">
                    <option value="active" data-i18n="common.enable">啟用</option>
                    <option value="inactive" data-i18n="common.disable">停用</option>
                </select>
            </div>
        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
    </div>
</div></div></div>

<script>
let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/bank-accounts';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, status: document.getElementById('filterStatus').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    return `<tr>
        <td>${item.bank_name || '--'}</td>
        <td>${item.account_name || '--'}</td>
        <td>${item.account_no || '--'}</td>
        <td>${item.branch || '--'}</td>
        <td>${item.currency || '--'}</td>
        <td>${item.is_default ? '<span class="badge bg-success">' + _t('pages.bank_accounts.default', '默認') + '</span>' : '--'}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td><div class="action-buttons">
            <button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
        </div></td>
    </tr>`;
}

function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.bank_accounts.add_account', '新增銀行帳戶');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.bank_accounts.add_account');
    resetForm('itemForm');
    openModal('formModal');
}

async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.bank_accounts.edit_account', '編輯銀行帳戶');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.bank_accounts.edit_account');
    try {
        const res = await apiRequest('GET', API_PATH + '/' + id);
        populateForm('itemForm', res.data || res);
        openModal('formModal');
    } catch(e) {}
}

async function saveItem() {
    const data = getFormData('itemForm');
    try {
        if (editingId) {
            await apiRequest('PUT', API_PATH + '/' + editingId, data);
            showToast(_t('common.update_success', '更新成功'), 'success');
        } else {
            await apiRequest('POST', API_PATH, data);
            showToast(_t('common.create_success', '建立成功'), 'success');
        }
        closeModal('formModal');
        loadData(currentPage);
    } catch(e) {}
}

async function deleteItem(id) {
    if (!confirmDelete(_t('pages.bank_accounts.confirm_delete', '確定要刪除此銀行帳戶嗎？'))) return;
    try {
        await apiRequest('DELETE', API_PATH + '/' + id);
        showToast(_t('common.delete_success', '刪除成功'), 'success');
        loadData(currentPage);
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
document.getElementById('filterStatus').addEventListener('change', () => loadData(1));
</script>
{{end}}
