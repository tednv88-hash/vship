{{define "pages/navigation_items"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.navigation_items.title">導航管理</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
            <i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span>
        </button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.navigation_items.search_name" placeholder="搜尋名稱..."></div>
        <select class="form-select" id="filterPosition" style="max-width:150px;">
            <option value="" data-i18n="pages.navigation_items.all_positions">全部位置</option>
            <option value="header" data-i18n="pages.navigation_items.top">頂部</option>
            <option value="footer" data-i18n="pages.navigation_items.bottom">底部</option>
            <option value="sidebar" data-i18n="pages.navigation_items.sidebar">側邊欄</option>
        </select>
        <select class="form-select" id="filterStatus" style="max-width:150px;">
            <option value="" data-i18n="common.all_status">全部狀態</option>
            <option value="active" data-i18n="common.enable">啟用</option>
            <option value="inactive" data-i18n="common.disable">停用</option>
        </select>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="common.name">名稱</th><th>URL</th><th data-i18n="pages.navigation_items.icon">圖示</th><th data-i18n="pages.navigation_items.position">位置</th><th data-i18n="common.sort">排序</th><th data-i18n="common.status">狀態</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.navigation_items.add_nav">新增導航</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
        <form id="itemForm">
            <input type="hidden" name="id" id="itemId">
            <div class="mb-3">
                <label class="form-label" data-i18n="common.name">名稱 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">URL <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="url" required data-i18n-placeholder="pages.navigation_items.url_placeholder" placeholder="例如: /about, https://...">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.navigation_items.icon">圖示</label>
                <input type="text" class="form-control" name="icon" data-i18n-placeholder="pages.navigation_items.icon_placeholder" placeholder="例如: fas fa-home">
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.navigation_items.parent_nav">上級導航</label>
                <select class="form-select" name="parent_id" id="parentSelect">
                    <option value="" data-i18n="pages.navigation_items.no_parent">無（頂級）</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" data-i18n="pages.navigation_items.position">位置 <span class="text-danger">*</span></label>
                <select class="form-select" name="position" required>
                    <option value="header" data-i18n="pages.navigation_items.top">頂部</option>
                    <option value="footer" data-i18n="pages.navigation_items.bottom">底部</option>
                    <option value="sidebar" data-i18n="pages.navigation_items.sidebar">側邊欄</option>
                </select>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" data-i18n="common.sort">排序</label>
                    <input type="number" class="form-control" name="sort_order" value="0" min="0">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" data-i18n="common.status">狀態</label>
                    <select class="form-select" name="status">
                        <option value="active" data-i18n="common.enable">啟用</option>
                        <option value="inactive" data-i18n="common.disable">停用</option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button>
    </div>
</div></div></div>

<script>
let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/navigation-items';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
const positionMap = { header: '頂部', footer: '底部', sidebar: '側邊欄' };

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, position: document.getElementById('filterPosition').value, status: document.getElementById('filterStatus').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    return `<tr>
        <td>${item.name || '--'}</td>
        <td><small>${item.url || '--'}</small></td>
        <td>${item.icon ? '<i class="' + item.icon + '"></i>' : '--'}</td>
        <td>${positionMap[item.position] || item.position || '--'}</td>
        <td>${item.sort_order ?? 0}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td><div class="action-buttons">
            <button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
        </div></td>
    </tr>`;
}

function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.navigation_items.add_nav', '新增導航');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.navigation_items.add_nav');
    resetForm('itemForm');
    openModal('formModal');
}

async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.navigation_items.edit_nav', '編輯導航');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.navigation_items.edit_nav');
    try {
        const res = await apiRequest('GET', API_PATH + '/' + id);
        populateForm('itemForm', res.data || res);
        openModal('formModal');
    } catch(e) {}
}

async function saveItem() {
    const data = getFormData('itemForm');
    try {
        if (editingId) {
            await apiRequest('PUT', API_PATH + '/' + editingId, data);
            showToast(_t('common.update_success', '更新成功'), 'success');
        } else {
            await apiRequest('POST', API_PATH, data);
            showToast(_t('common.create_success', '建立成功'), 'success');
        }
        closeModal('formModal');
        loadData(currentPage);
    } catch(e) {}
}

async function deleteItem(id) {
    if (!confirmDelete(_t('pages.navigation_items.confirm_delete', '確定要刪除此導航嗎？'))) return;
    try {
        await apiRequest('DELETE', API_PATH + '/' + id);
        showToast(_t('common.delete_success', '刪除成功'), 'success');
        loadData(currentPage);
    } catch(e) {}
}

async function loadParentItems() {
    try {
        const res = await apiRequest('GET', API_PATH + '?limit=100');
        const items = res.data || res || [];
        const sel = document.getElementById('parentSelect');
        items.forEach(n => sel.insertAdjacentHTML('beforeend', `<option value="${n.id}">${n.name}</option>`));
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => { loadData(1); loadParentItems(); });
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
document.getElementById('filterPosition').addEventListener('change', () => loadData(1));
document.getElementById('filterStatus').addEventListener('change', () => loadData(1));
</script>
{{end}}
