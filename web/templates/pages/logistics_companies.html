{{define "pages/logistics_companies"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.logistics_companies.title">物流公司</h5>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="fas fa-plus me-1"></i><span data-i18n="common.add">新增</span></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.logistics_companies.search_company" placeholder="搜尋物流公司名稱/代碼..."></div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.logistics_companies.company_name">公司名稱</th><th data-i18n="pages.logistics_companies.company_code">代碼</th><th data-i18n="pages.logistics_companies.contact">聯絡人</th><th data-i18n="pages.logistics_companies.contact_phone">電話</th><th data-i18n="pages.logistics_companies.website">網站</th><th data-i18n="common.status">狀態</th><th data-i18n="common.actions">操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="7" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="pages.logistics_companies.add_company">新增物流公司</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="itemForm"><input type="hidden" name="id">
        <div class="mb-3"><label class="form-label" data-i18n="pages.logistics_companies.company_name">公司名稱 <span class="text-danger">*</span></label><input type="text" class="form-control" name="name" required></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.logistics_companies.company_code">代碼</label><input type="text" class="form-control" name="code" data-i18n-placeholder="pages.logistics_companies.code_placeholder" placeholder="如: SF, DHL"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.logistics_companies.contact">聯絡人</label><input type="text" class="form-control" name="contact_name"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.logistics_companies.contact_phone">聯絡電話</label><input type="text" class="form-control" name="contact_phone"></div>
        <div class="mb-3"><label class="form-label" data-i18n="pages.logistics_companies.website">網站</label><input type="url" class="form-control" name="website" placeholder="https://"></div>
        <div class="mb-3"><label class="form-label" data-i18n="common.status">狀態</label><select class="form-select" name="status"><option value="active" data-i18n="common.enable">啟用</option><option value="inactive" data-i18n="common.disable">停用</option></select></div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button><button type="button" class="btn btn-primary" onclick="saveItem()" data-i18n="common.save">儲存</button></div>
</div></div></div>
<script>
let currentPage = 1; const limit = 20; let editingId = null; const API_PATH = '/logistics-companies';
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;
function loadData(page) { currentPage = page; loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, buildQueryParams({ search: document.getElementById('searchInput').value })); }
function renderRow(item) {
    const website = item.website ? `<a href="${item.website}" target="_blank" class="text-truncate d-inline-block" style="max-width:120px">${item.website}</a>` : '--';
    return `<tr><td>${item.name||'--'}</td><td><strong>${item.code||'--'}</strong></td><td>${item.contact_name||'--'}</td><td>${item.contact_phone||'--'}</td><td>${website}</td><td>${getStatusBadge(item.status)}</td><td><div class="action-buttons"><button class="btn btn-sm btn-outline-primary" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
}
function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = _t('pages.logistics_companies.add_company', '新增物流公司');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.logistics_companies.add_company');
    resetForm('itemForm'); openModal('formModal');
}
async function editItem(id) {
    editingId = id;
    document.getElementById('modalTitle').textContent = _t('pages.logistics_companies.edit_company', '編輯物流公司');
    document.getElementById('modalTitle').setAttribute('data-i18n', 'pages.logistics_companies.edit_company');
    try { const res = await apiRequest('GET', API_PATH+'/'+id); populateForm('itemForm', res.data||res); openModal('formModal'); } catch(e){}
}
async function saveItem() { const data = getFormData('itemForm'); try { if(editingId){await apiRequest('PUT',API_PATH+'/'+editingId,data);showToast(_t('common.update_success','更新成功'));}else{await apiRequest('POST',API_PATH,data);showToast(_t('common.create_success','建立成功'));} closeModal('formModal'); loadData(currentPage); } catch(e){} }
async function deleteItem(id) { if(!confirmDelete(_t('pages.logistics_companies.confirm_delete','確定要刪除此物流公司嗎？')))return; try{await apiRequest('DELETE',API_PATH+'/'+id);showToast(_t('common.delete_success','刪除成功'));loadData(currentPage);}catch(e){} }
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
