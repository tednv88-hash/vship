{{define "pages/blind_box_draws"}}
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0" data-i18n="pages.blind_box.draw_records_title">盲盒抽獎記錄</h5>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.blind_box.search_activity_user" placeholder="搜尋活動/用戶..."></div>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th data-i18n="pages.blind_box.activity">活動</th><th data-i18n="pages.blind_box.user">用戶</th><th data-i18n="pages.blind_box.prize_info">獎品信息</th><th data-i18n="pages.blind_box.cost_points">消耗積分</th><th data-i18n="common.time">時間</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>
<script>
let currentPage = 1; const limit = 20; const API_PATH = '/blind-box/draws';
function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}
function renderRow(item) {
    return `<tr><td>${item.activity_name||'--'}</td><td>${item.user_name||'--'}</td><td>${item.prize_name||item.prize_info||'--'}</td><td>${item.cost_points||0}</td><td>${formatDate(item.created_at)}</td></tr>`;
}
document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
