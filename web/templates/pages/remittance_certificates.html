{{define "pages/remittance_certificates"}}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0" data-i18n="pages.remittance_certificates.title">匯款憑證審核</h5>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData(1)"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="filter-bar">
        <div class="search-input-group"><i class="fas fa-search search-icon"></i><input type="text" class="form-control" id="searchInput" data-i18n-placeholder="pages.remittance_certificates.search_placeholder" placeholder="搜尋用戶/訂單..."></div>
        <ul class="nav nav-tabs card-header-tabs" id="statusTabs">
            <li class="nav-item"><a class="nav-link active" href="#" data-status="" onclick="switchTab(this)" data-i18n="common.all">全部</a></li>
            <li class="nav-item"><a class="nav-link" href="#" data-status="pending" onclick="switchTab(this)" data-i18n="pages.remittance_certificates.status_pending">待審核</a></li>
            <li class="nav-item"><a class="nav-link" href="#" data-status="approved" onclick="switchTab(this)" data-i18n="pages.remittance_certificates.status_approved">已通過</a></li>
            <li class="nav-item"><a class="nav-link" href="#" data-status="rejected" onclick="switchTab(this)" data-i18n="pages.remittance_certificates.status_rejected">已拒絕</a></li>
        </ul>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th data-i18n="pages.remittance_certificates.user">用戶</th>
                <th data-i18n="pages.remittance_certificates.order">訂單</th>
                <th data-i18n="common.amount">金額</th>
                <th data-i18n="pages.remittance_certificates.currency">幣種</th>
                <th data-i18n="pages.remittance_certificates.certificate_image">憑證圖片</th>
                <th data-i18n="common.status">狀態</th>
                <th data-i18n="common.time">時間</th>
                <th data-i18n="common.actions">操作</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="8" class="text-center py-4 text-muted" data-i18n="common.loading">載入中...</td></tr></tbody>
        </table>
    </div>
    <div id="pagination"></div>
</div>

<!-- Reject Modal -->
<div class="modal fade" id="rejectModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" data-i18n="pages.remittance_certificates.reject_certificate">拒絕憑證</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
        <div class="mb-3">
            <label class="form-label" data-i18n="pages.remittance_certificates.reject_reason">拒絕原因 <span class="text-danger">*</span></label>
            <textarea class="form-control" id="auditRemark" rows="3" data-i18n-placeholder="pages.remittance_certificates.enter_reject_reason" placeholder="請輸入拒絕原因"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-danger" onclick="doReject()" data-i18n="pages.remittance_certificates.confirm_reject">確定拒絕</button>
    </div>
</div></div></div>

<!-- Image Preview Modal -->
<div class="modal fade" id="imageModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" data-i18n="pages.remittance_certificates.certificate_image">憑證圖片</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body text-center">
        <img id="previewImage" src="" class="img-fluid" style="max-height:600px;">
    </div>
</div></div></div>

<script>
let currentPage = 1; const limit = 20; const API_PATH = '/remittance-certificates';
let currentStatus = ''; let rejectingId = null;
const _t = (key, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(key) : fallback;

function switchTab(el) {
    document.querySelectorAll('#statusTabs .nav-link').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
    currentStatus = el.dataset.status;
    loadData(1);
}

function loadData(page) {
    currentPage = page;
    const params = buildQueryParams({ search: document.getElementById('searchInput').value, status: currentStatus });
    loadTableData(API_PATH, 'tableBody', renderRow, 'pagination', page, limit, params);
}

function renderRow(item) {
    const img = item.certificate_image
        ? `<img src="${item.certificate_image}" class="rounded" style="width:50px;height:50px;object-fit:cover;cursor:pointer;" onclick="previewImage('${item.certificate_image}')">`
        : '--';
    let actions = '--';
    if (item.status === 'pending') {
        actions = `<div class="action-buttons">
            <button class="btn btn-sm btn-outline-success" onclick="approveItem('${item.id}')"><i class="fas fa-check"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="openRejectModal('${item.id}')"><i class="fas fa-times"></i></button>
        </div>`;
    }
    return `<tr>
        <td>${item.user_name || '--'}</td>
        <td>${item.order_no || '--'}</td>
        <td>${formatMoney(item.amount)}</td>
        <td>${item.currency || '--'}</td>
        <td>${img}</td>
        <td>${getStatusBadge(item.status)}</td>
        <td>${formatDate(item.created_at)}</td>
        <td>${actions}</td>
    </tr>`;
}

function previewImage(url) {
    document.getElementById('previewImage').src = url;
    openModal('imageModal');
}

async function approveItem(id) {
    if (!confirm(_t('pages.remittance_certificates.confirm_approve', '確定要通過此匯款憑證嗎？'))) return;
    try {
        await apiRequest('PUT', API_PATH + '/' + id + '/approve');
        showToast(_t('pages.remittance_certificates.approved', '已通過'), 'success');
        loadData(currentPage);
    } catch(e) {}
}

function openRejectModal(id) {
    rejectingId = id;
    document.getElementById('auditRemark').value = '';
    openModal('rejectModal');
}

async function doReject() {
    const audit_remark = document.getElementById('auditRemark').value;
    if (!audit_remark) { showToast(_t('pages.remittance_certificates.enter_reject_reason', '請輸入拒絕原因'), 'error'); return; }
    try {
        await apiRequest('PUT', API_PATH + '/' + rejectingId + '/reject', { audit_remark });
        showToast(_t('pages.remittance_certificates.rejected', '已拒絕'), 'success');
        closeModal('rejectModal');
        loadData(currentPage);
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => loadData(1));
document.getElementById('searchInput').addEventListener('input', debounce(() => loadData(1)));
</script>
{{end}}
