<svg xmlns="http://www.w3.org/2000/svg" width="750" height="340" viewBox="0 0 750 340">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40"/>
      <stop offset="100%" style="stop-color:#00796b"/>
    </linearGradient>
    <linearGradient id="green3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#69f0ae"/>
      <stop offset="100%" style="stop-color:#00e676"/>
    </linearGradient>
  </defs>
  <rect width="750" height="340" fill="url(#bg3)"/>
  <!-- Warehouse illustration -->
  <g transform="translate(460, 60)" opacity="0.9">
    <!-- Building -->
    <rect x="0" y="60" width="220" height="160" rx="4" fill="rgba(255,255,255,0.08)"/>
    <polygon points="110,-10 -10,60 230,60" fill="rgba(255,255,255,0.06)"/>
    <!-- Door -->
    <rect x="80" y="130" width="60" height="90" rx="2" fill="rgba(255,255,255,0.12)"/>
    <!-- Windows -->
    <rect x="20" y="80" width="40" height="30" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="160" y="80" width="40" height="30" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="20" y="130" width="40" height="30" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="160" y="130" width="40" height="30" rx="2" fill="rgba(255,255,255,0.1)"/>
    <!-- Shelves with boxes -->
    <rect x="25" y="85" width="12" height="20" rx="1" fill="#69f0ae" opacity="0.5"/>
    <rect x="40" y="90" width="10" height="15" rx="1" fill="#69f0ae" opacity="0.4"/>
    <rect x="165" y="85" width="12" height="20" rx="1" fill="#69f0ae" opacity="0.5"/>
    <rect x="180" y="88" width="14" height="17" rx="1" fill="#69f0ae" opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="60" y="95" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="18" fill="#69f0ae" font-weight="600">倉庫服務</text>
  <text x="60" y="150" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="38" font-weight="700" fill="#ffffff">免費倉儲 30 天</text>
  <text x="60" y="190" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">專業打包 · 拍照驗貨 · 合併包裹</text>
  <!-- Features -->
  <g transform="translate(60, 220)">
    <rect width="200" height="36" rx="6" fill="rgba(255,255,255,0.1)"/>
    <circle cx="18" cy="18" r="10" fill="#69f0ae" opacity="0.3"/>
    <text x="18" y="22" font-size="12" fill="#69f0ae" text-anchor="middle" font-family="sans-serif">✓</text>
    <text x="38" y="23" font-size="13" fill="#ffffff" font-family="'Noto Sans TC',sans-serif">免費拍照驗貨</text>
  </g>
  <g transform="translate(60, 264)">
    <rect width="200" height="36" rx="6" fill="rgba(255,255,255,0.1)"/>
    <circle cx="18" cy="18" r="10" fill="#69f0ae" opacity="0.3"/>
    <text x="18" y="22" font-size="12" fill="#69f0ae" text-anchor="middle" font-family="sans-serif">✓</text>
    <text x="38" y="23" font-size="13" fill="#ffffff" font-family="'Noto Sans TC',sans-serif">智能合併省運費</text>
  </g>
</svg>