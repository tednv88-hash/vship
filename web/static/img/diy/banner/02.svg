    <line x1="0" y1="0" x2="80" y2="-40" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="80" y1="-40" x2="40" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3 3"/>
  </g>
