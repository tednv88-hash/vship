  <rect width="750" height="340" fill="url(#bg2)"/>
  <!-- Globe decoration -->
  <circle cx="580" cy="170" r="130" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <ellipse cx="580" cy="170" rx="130" ry="50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <ellipse cx="580" cy="170" rx="50" ry="130" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <line x1="450" y1="170" x2="710" y2="170" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="580" y1="40" x2="580" y2="300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
