  <text x="60" y="100" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="18" fill="url(#gold2)" font-weight="600">🔥 限時活動</text>
  <text x="60" y="155" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="40" font-weight="700" fill="#ffffff">1688 代購代採</text>
