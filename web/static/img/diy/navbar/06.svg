<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 新手指引 Guide/Compass Icon -->
  <defs>
    <linearGradient id="guideGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="45" r="30" fill="none" stroke="url(#guideGrad)" stroke-width="3"/>
  <circle cx="50" cy="45" r="25" fill="#ecfeff"/>
  <polygon points="50,22 56,42 50,38 44,42" fill="#0891b2"/>
  <polygon points="50,68 44,48 50,52 56,48" fill="#f97316"/>
  <circle cx="50" cy="45" r="4" fill="#0891b2"/>
  <!-- Compass markers -->
  <text x="50" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0891b2" font-weight="bold">N</text>
  <text x="50" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#999">S</text>
  <text x="50" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#333">新手指引</text>
</svg>