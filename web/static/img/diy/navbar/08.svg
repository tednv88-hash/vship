  </defs>
  <rect x="18" y="12" width="64" height="72" rx="8" fill="url(#calcGrad)" stroke="#c2410c" stroke-width="1.5"/>
  <rect x="25" y="18" width="50" height="18" rx="3" fill="#fff" opacity="0.9"/>
  <text x="68" y="32" text-anchor="end" font-family="Arial,sans-serif" font-size="12" fill="#ea580c" font-weight="bold">¥0.00</text>
