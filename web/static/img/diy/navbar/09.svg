<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 優惠券 Coupon Icon -->
  <defs>
    <linearGradient id="couponGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
  </defs>
  <rect x="10" y="22" width="80" height="50" rx="6" fill="url(#couponGrad)"/>
  <!-- Coupon cutout circles -->
  <circle cx="10" cy="47" r="6" fill="#fff"/>
  <circle cx="90" cy="47" r="6" fill="#fff"/>
  <!-- Dashed divider -->
  <line x1="32" y1="26" x2="32" y2="68" stroke="#fff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
  <!-- Discount text -->
  <text x="21" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#fff" font-weight="bold">¥</text>
  <text x="61" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#fff" opacity="0.9">滿額折扣</text>
  <text x="61" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fff" opacity="0.7">限時優惠中</text>
  <text x="50" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#333">優惠券</text>
</svg>