<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- 商品1: 集運紙箱套裝 Shipping Carton Set -->
  <defs>
    <linearGradient id="g1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9ef"/>
      <stop offset="100%" style="stop-color:#fdf2e9"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#g1bg)"/>
  <!-- Cardboard box -->
  <rect x="60" y="80" width="180" height="130" rx="4" fill="#d4a574" stroke="#b8860b" stroke-width="2"/>
  <polygon points="60,80 90,55 270,55 240,80" fill="#c49660" stroke="#b8860b" stroke-width="1.5"/>
  <polygon points="240,80 270,55 270,185 240,210" fill="#b8860b" opacity="0.3"/>
  <!-- Box flaps -->
  <polygon points="60,80 150,60 240,80 150,95" fill="#deb887" stroke="#b8860b" stroke-width="1"/>
  <!-- Tape -->
  <rect x="130" y="95" width="40" height="115" rx="2" fill="#f5deb3" opacity="0.6" stroke="#daa520" stroke-width="1"/>
  <!-- Label -->
  <rect x="85" y="120" width="80" height="50" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <line x1="95" y1="133" x2="155" y2="133" stroke="#ddd" stroke-width="2"/>
  <line x1="95" y1="143" x2="145" y2="143" stroke="#ddd" stroke-width="2"/>
  <line x1="95" y1="153" x2="135" y2="153" stroke="#ddd" stroke-width="2"/>
  <!-- Price tag -->
  <rect x="180" y="220" width="90" height="35" rx="4" fill="#ef4444"/>
  <text x="225" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#fff" font-weight="bold">¥12.90</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#666">集運紙箱套裝</text>
</svg>