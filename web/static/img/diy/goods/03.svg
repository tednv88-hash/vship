<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- 商品3: 電子秤 Digital Scale -->
  <defs>
    <linearGradient id="g3bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f3ff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#g3bg)"/>
  <!-- Scale platform -->
  <rect x="50" y="100" width="200" height="120" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <!-- Display screen -->
  <rect x="90" y="115" width="120" height="45" rx="6" fill="#1e1b4b"/>
  <text x="150" y="145" text-anchor="middle" font-family="monospace" font-size="22" fill="#4ade80" font-weight="bold">5.28 kg</text>
  <!-- Buttons -->
  <circle cx="110" cy="185" r="8" fill="url(#scaleGrad)"/>
  <circle cx="150" cy="185" r="8" fill="url(#scaleGrad)"/>
  <circle cx="190" cy="185" r="8" fill="url(#scaleGrad)"/>
  <text x="110" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fff">ON</text>
  <text x="150" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fff">TARE</text>
  <text x="190" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fff">UNIT</text>
  <!-- Price tag -->
  <rect x="180" y="220" width="90" height="35" rx="4" fill="#ef4444"/>
  <text x="225" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#fff" font-weight="bold">¥59.00</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#666">集運電子秤</text>
</svg>